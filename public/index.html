  // Text-to-Video — Gemini Veo (async: submit → poll → display)
  async function genVeoVideo(){
    if (state.ttvGenLoading) return;
    var promptEl = document.getElementById('ppTtvPrompt');
    var prompt = ((promptEl ? promptEl.value : (state.ttvPrompt||'')) || '').trim();
    if (!prompt) { toast(state.lang==='th'?'ใส่คำสั่งบรรยายวิดีโอก่อน':'Enter a video prompt first','error'); return; }
    var picked = state.ttvModel || 'veo-2.0-generate-001';
    // Pick provider from model id prefix — Veo endpoints vs fal.ai endpoints differ
    var isFal = picked.indexOf('fal-ai/') === 0;
    state.ttvGenLoading = true;
    state.ttvGenStatus = state.lang==='th'?(isFal?'ส่งคำขอไป fal.ai…':'ส่งคำขอไป Veo…'):(isFal?'Submitting to fal.ai…':'Submitting to Veo…');
    state.ttvVideo = null;
    render();
    toast(state.lang==='th'
      ? ((isFal?picked.split('/').pop():'Veo')+' เริ่มเรนเดอร์ (~1-3 นาที)')
      : ((isFal?'fal.ai':'Veo')+' started (~1-3 min)'));
    try {
      if (isFal) {
        // ── fal.ai path: submit → poll /fal-t2v-poll
        var sub = await api('/api/ai/fal-t2v-submit', { method:'POST', body:{
          prompt: prompt,
          aspect: state.ttvAspect||'9:16',
          referenceImage: state.ttvReference || null,
          model: picked,
          duration_sec: parseInt((state.ttvDuration||'8s'),10) || 8,
        }});
        if (!sub || !sub.request_id) throw new Error((sub && sub.error) || 'submit failed');
        state.ttvGenStatus = state.lang==='th'?'fal.ai กำลังเรนเดอร์…':'fal.ai rendering…';
        render();
        var ok = false;
        for (var i = 0; i < 60; i++) {                  // 60 × 5s = 5 min
          await new Promise(function(r){ setTimeout(r, 5000); });
          try {
            var st = await api('/api/ai/fal-t2v-poll?request_id=' + encodeURIComponent(sub.request_id)
              + '&model=' + encodeURIComponent(sub.model)
              + '&status_url=' + encodeURIComponent(sub.status_url||'')
              + '&response_url=' + encodeURIComponent(sub.response_url||''));
            if (st && st.status === 'done' && st.video_url) {
              state.ttvVideo = st.video_url; ok = true;
              toast(state.lang==='th'?'สร้างวิดีโอเสร็จแล้ว ✓':'Video ready ✓','success');
              break;
            }
            if (st && st.status === 'error') throw new Error(st.error || 'fal failed');
            state.ttvGenStatus = state.lang==='th'?('รอ '+((i+1)*5)+' วินาที…'):('Waited '+((i+1)*5)+'s…');
            render();
          } catch(_){}
        }
        if (!ok) toast(state.lang==='th'?'หมดเวลารอ (~5 นาที) — ลองใหม่':'Timed out — try again','error');
      } else {
        // ── Veo path
        var sub = await api('/api/ai/veo-generate', { method:'POST', body:{
          prompt: prompt,
          aspect: state.ttvAspect||'9:16',
          referenceImage: state.ttvReference || null,
          model: picked,
        } });
        if (!sub || !sub.operation) throw new Error((sub && sub.error) || 'submit failed');
        var op = sub.operation;
        state.ttvGenStatus = state.lang==='th'?'Veo กำลังเรนเดอร์…':'Veo rendering…';
        render();
        var ok = false;
        for (var i = 0; i < 40; i++) {
          await new Promise(function(r){ setTimeout(r, 10000); });
          try {
            var st = await api('/api/ai/veo-status?op=' + encodeURIComponent(op));
            if (st && st.done) {
              if (st.failed) throw new Error(st.error || 'render failed');
              if (st.video_url) state.ttvVideo = st.video_url;
              else if (st.video_base64) state.ttvVideo = 'data:video/mp4;base64,' + st.video_base64;
              else throw new Error('no video in response');
              ok = true;
              toast(state.lang==='th'?'สร้างวิดีโอเสร็จแล้ว ✓':'Video ready ✓','success');
              break;
            } else {
              state.ttvGenStatus = state.lang==='th'?('รอ '+((i+1)*10)+' วินาที…'):('Waited '+((i+1)*10)+'s…');
              render();
            }
          } catch(_){ /* keep polling on transient errors */ }
        }
        if (!ok) toast(state.lang==='th'?'หมดเวลารอ (~7 นาที) — ลองใหม่':'Timed out — try again','error');
      }
    } catch(e){
      var em = e.message || '';
      // Quota / billing — Veo 3.x requires paid plan; offer to retry with the free-tier Veo 2
      if (/quota|exceeded|billing|rate.?limit|RESOURCE_EXHAUSTED|429/i.test(em)) {
        var pickedModel = state.ttvModel || '';
        if (pickedModel.indexOf('veo-2') !== 0) {
          var msg = state.lang==='th'
            ? 'โควต้า '+pickedModel.replace('-generate-001','').replace('-generate-preview','')+' หมด — Veo 3.x ต้องเปิด billing ที่ Google AI / เปลี่ยนเป็น Veo 2 (free) แทนไหม?'
            : pickedModel+' quota hit — switch to Veo 2 (free tier)?';
          if (window.confirm(msg)) {
            state.ttvModel = 'veo-2.0-generate-001';
            render();
            toast(state.lang==='th'?'เปลี่ยนเป็น Veo 2 แล้ว — กดสร้างอีกครั้ง':'Switched to Veo 2 — hit generate again','success');
          } else {
            toast(state.lang==='th'?'เปิด billing ที่ https://aistudio.google.com/apikey':'Enable billing at aistudio.google.com/apikey','error');
          }
        } else {
          toast(state.lang==='th'?'Veo 2 free tier หมดวันนี้แล้ว — เปิด billing หรือลองพรุ่งนี้':'Veo 2 free tier exhausted today — enable billing or wait','error');
        }
      } else {
        toast((state.lang==='th'?'สร้างวิดีโอไม่สำเร็จ: ':'Failed: ')+em,'error');
      }
    } finally {
      state.ttvGenLoading = false;
      state.ttvGenStatus = '';
      render();
    }
  }

  // Compress a base64 image to ~thumbnail size so it fits in localStorage
  // IndexedDB store for full-size draft images (localStorage is too small for many full-quality images)
  var _ppIdbPromise = null;
  function _ppIdb(){
    if (_ppIdbPromise) return _ppIdbPromise;
    _ppIdbPromise = new Promise(function(resolve, reject){
      var req = indexedDB.open('postpost-images', 1);
      req.onupgradeneeded = function(){ req.result.createObjectStore('images'); };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
    return _ppIdbPromise;
  }
  async function idbPutImage(key, val){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').put(val, key);
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
    });
  }
  async function idbGetImage(key){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readonly');
      var req = tx.objectStore('images').get(key);
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  }
  async function idbDeleteImage(key){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').delete(key);
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
    });
  }

  function compressImageDataUrl(dataUrl, maxDim, quality){
    maxDim = maxDim || 360; quality = quality || 0.7;
    return new Promise(function(resolve){
      if (!dataUrl || dataUrl.indexOf('data:') !== 0) return resolve(dataUrl);
      var img = new Image();
      img.onload = function(){
        var w = img.width || maxDim, h = img.height || maxDim;
        var s = Math.min(1, maxDim / Math.max(w, h));
        w = Math.max(1, Math.round(w * s)); h = Math.max(1, Math.round(h * s));
        try {
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        } catch(e){ resolve(dataUrl); }
      };
      img.onerror = function(){ resolve(dataUrl); };
      img.src = dataUrl;
    });
  }
  // Save the current generated content as a Draft.

  // thumbnail of the cover image is kept in the draft for the Library card.

      try { await idbPutImage(iid, imgs[i]); imageIds.push(iid); }
      catch(e){ imageIds.push(null); }
    }
    var thumb = imgs[0] ? await compressImageDataUrl(imgs[0], 360, 0.7) : '';
    var imageCount = imageIds.filter(Boolean).length;
    var draft = {

  // Pull the first frame of a video (URL or data URL) as a JPEG poster. Best-effort —
  // returns '' if the video can't be loaded (CORS, codec, …) so the caller falls back
  // to the reference image or no thumbnail at all.
  function videoPosterDataUrl(src, maxDim){
    maxDim = maxDim || 360;
    return new Promise(function(resolve){
      try {
        var v = document.createElement('video');
        v.crossOrigin = 'anonymous';
        v.muted = true; v.playsInline = true; v.preload = 'auto';
        v.src = src;
        var done = false;
        var bail = function(){ if (!done) { done = true; resolve(''); } };
        var grab = function(){
          if (done) return;
          try {
            var w = v.videoWidth || maxDim, h = v.videoHeight || maxDim;
            var s = Math.min(1, maxDim / Math.max(w, h));
            w = Math.max(1, Math.round(w * s)); h = Math.max(1, Math.round(h * s));
            var c = document.createElement('canvas'); c.width = w; c.height = h;
            c.getContext('2d').drawImage(v, 0, 0, w, h);
            done = true; resolve(c.toDataURL('image/jpeg', 0.7));
          } catch(e){ bail(); }
        };
        v.onloadeddata = function(){ try { v.currentTime = Math.min(0.1, (v.duration||0.1)/2); } catch(_){ grab(); } };
        v.onseeked = grab;
        v.onerror = bail;
        setTimeout(bail, 6000);  // hard timeout
      } catch(e) { resolve(''); }
    });
  }

  // Save the generated Veo video as a draft. Remote video_url drafts keep just the URL
  // in localStorage; base64 fallbacks go straight to IndexedDB so the 5MB cap doesn't
  // blow up. A poster (first frame, or the reference image) is kept for the Library card.
  async function saveVideoDraft(){
    if (!state.ttvVideo) { toast(state.lang==='th'?'ยังไม่มีวิดีโอ':'No video yet','error'); return; }
    if (state.ttvSavingDraft) return;
    state.ttvSavingDraft = true; render();
    try {
      var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
      var promptEl = document.getElementById('ppTtvPrompt');
      var promptText = ((promptEl ? promptEl.value : (state.ttvPrompt||'')) || '').trim();
      var topic = state.selectedTopic || promptText.slice(0, 80) || (state.lang==='th'?'วิดีโอ Veo':'Veo video');
      var draftId = 'dv' + Date.now();

      // Poster — try first frame; fall back to the reference image; else empty
      var poster = '';
      try { poster = await videoPosterDataUrl(state.ttvVideo, 360); } catch(_){}
      if (!poster && state.ttvReference) {
        try { poster = await compressImageDataUrl(state.ttvReference, 360, 0.7); } catch(_){}
      }

      // Video bytes — data: URLs go to IDB so localStorage stays small; http URLs ride along in the draft
      var videoId = null;
      var videoUrl = '';
      if (typeof state.ttvVideo === 'string' && state.ttvVideo.indexOf('data:') === 0) {
        videoId = 'vid_' + draftId;
        try { await idbPutImage(videoId, state.ttvVideo); }
        catch(e) { videoId = null; toast(state.lang==='th'?'พื้นที่เก็บไม่พอ — บันทึกแค่ลิงก์':'Storage low — saved link only','error'); }
      } else {
        videoUrl = state.ttvVideo;
      }

      var draft = {
        id: draftId,
        kind: 'video',                                    // tells Library + editDraft this is a Veo draft
        brandId: state.brand,
        brandName: ab ? ab.name : '',
        topic: topic,
        prompt: promptText,
        aspect: state.ttvAspect || '9:16',
        duration: state.ttvDuration || '8s',
        videoUrl: videoUrl,                               // populated when Veo returned a Supabase URL
        videoId: videoId,                                 // populated when video lives in IDB
        referenceImage: state.ttvReference || '',         // small; OK in localStorage
        referenceProductName: state.ttvReferenceProductName || '',
        thumb: poster,
        createdAt: Date.now(),
      };
      state.drafts = state.drafts || [];
      state.drafts.unshift(draft);
      try { localStorage.setItem('postpost_drafts', JSON.stringify(state.drafts)); }
      catch(e) {
        draft.thumb = '';
        try { localStorage.setItem('postpost_drafts', JSON.stringify(state.drafts)); } catch(_){}
      }
      toast(state.lang==='th'?'บันทึกดราฟวิดีโอแล้ว ✓ (ดูได้ที่ "คลังคอนเทนต์")':'Video draft saved ✓ (see Library)','success');
    } finally {
      state.ttvSavingDraft = false; render();
    }
  }

  // Shopee scraper — Re-sync button runs the real scrape
  async function shopeeSync(){
    if (state.shopScraping) return;
    var inp = document.getElementById('ppShopUrl');
    var url = inp ? inp.value.trim() : '';
    if (!url) { toast(state.lang==='th'?'วาง URL ร้าน Shopee ก่อน':'Paste a Shopee shop URL first','error'); return; }
    state.shopUrl = url;
    state.shopScraping = true;
    render();
    toast(state.lang==='th'?'กำลังดึงข้อมูลจาก Shopee… อาจใช้เวลา 1-3 นาที':'Scraping Shopee… 1-3 minutes');
    try {
      // Async pattern: submit returns 202 + job_id, then poll until done.
      // This avoids Vercel's 60s function timeout for slow cold-started workers.
      var sub = await api('/api/shopee/scrape', { method:'POST', body:{ url: url } });
      var j = sub;
      // If backend used async path (cloud mode), poll for completion
      if (sub && sub.job_id && sub.status === 'pending') {
        var pollMax = 90;                              // 90 × 4s = 6 min hard cap
        for (var k = 0; k < pollMax; k++) {
          await new Promise(function(r){ setTimeout(r, 4000); });
          try {
            var st = await api('/api/shopee/scrape-status?job_id=' + encodeURIComponent(sub.job_id));
            if (st && st.status === 'done') { j = st.result || {}; break; }
            if (st && st.status === 'error') {
              j = st.result || { error: 'cloud', message: 'scrape failed on worker' };
              break;
            }
            // status='pending' or 'not_found' → keep polling (Render might be cold-starting)
          } catch (pollErr) {
            // transient network — keep polling
          }
        }
        if (!j || (!j.products && !j.ok)) throw new Error('หมดเวลารอ Render worker (~6 นาที) — ลองใหม่อีกครั้ง');
      }
      var prods = j.products || [];
      if (!prods.length) { toast(state.lang==='th'?'ไม่พบสินค้าในร้านนี้':'No products found','error'); return; }
      PRODUCTS = prods.slice(0, 24).map(function(p, i){
        return { id:'sp'+i, name_th:p.name, name_en:p.name, short:(p.name||'').slice(0,30),
          price: Math.round(p.price||0), priceBefore: Math.round(p.price_before||0),
          sales: String(p.sold||0), sold: p.sold||0, rating: p.rating||0,
          thumbnail: p.thumbnail||'', images: p.images||[], url: p.url||'',
          description: p.description||'', stock: p.stock||0, label:'' };
      });
      state.selectedProducts = PRODUCTS.map(function(p){ return p.id; });
      var inStock = prods.filter(function(p){ return (p.stock||0) > 0; }).length;
      var priced = prods.filter(function(p){ return p.price > 0; });
      var avg = priced.length ? Math.round(priced.reduce(function(s,p){ return s+p.price; },0)/priced.length) : 0;
      var rated = prods.filter(function(p){ return p.rating > 0; });
      var avgR = rated.length ? (rated.reduce(function(s,p){ return s+p.rating; },0)/rated.length).toFixed(1) : '';
      state.shopStats = { count: j.count || prods.length, inStock: inStock, avgPrice: avg.toLocaleString(), rating: avgR };
      // persist the scraped catalog onto the active brand so it survives reloads
      var _ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
      if (_ab) { _ab.products = PRODUCTS; _ab.shopStats = state.shopStats; _ab.shopUrl = url; saveBrands(); }
      toast((state.lang==='th'?'ดึงข้อมูลสำเร็จ — ':'Synced — ') + (j.count||prods.length) + (state.lang==='th'?' สินค้า':' products'),'success');
    } catch(e){
      toast((state.lang==='th'?'ดึงข้อมูลไม่สำเร็จ: ':'Sync failed: ') + (e.message||''),'error');
    } finally {
      state.shopScraping = false;
      render();
    }
  }
  document.addEventListener('click', function(e){
    if (e.target.closest('[data-shopeesync]')) shopeeSync();
  });

  // AI brand-description writer — based on brand name + business type
  async function aiWriteDesc(){
    // Always re-read from the brand object first so the live dropdown selection wins
    // even if the user just switched it but didn't trigger a re-render.
    var ab = BRANDS.find(function(b){ return b.id === state.brand; }) || BRANDS[0];
    var bizSel = document.getElementById('ppBizType');
    var bizType = (bizSel && bizSel.value) || (ab && ab.bizType) || '';
    if (ab && bizType && ab.bizType !== bizType) ab.bizType = bizType;   // sync any pending change
    state.aiAssistOpen = true;
    state.aiDescLoading = true;
    state.aiDescs = [];
    render();
    try {
      var d = await api('/api/ai/brand-description', { method:'POST',
        // NOTE: intentionally NOT passing `current` — the leftover text from a previous
        // business type (e.g. skincare copy when user switches to "ดูดวง") would bias AI.
        // User clicks "AI write" specifically because they want a FRESH description.
        body: { businessType: bizType, brandName: ab ? ab.name : '' } });
      state.aiDescs = (d.descriptions || []).filter(function(x){ return typeof x === 'string' && x.trim(); });
      if (!state.aiDescs.length) toast(state.lang==='th'?'AI ไม่ได้คืนคำอธิบาย ลองใหม่':'No descriptions returned','error');
    } catch(e){
      toast((state.lang==='th'?'เขียนไม่สำเร็จ: ':'Failed: ') + e.message, 'error');
    } finally {
      state.aiDescLoading = false;
      render();
    }
  }
  document.addEventListener('click', function(e){
    if (e.target.closest('[data-aiwrite]')) { aiWriteDesc(); return; }
    var useBtn = e.target.closest('[data-usedesc],[data-usedesc-s]');
    if (useBtn) {
      var ta = document.getElementById('ppBrandDesc');
      var text;
      if (useBtn.dataset.usedesc !== undefined) text = state.aiDescs[+useBtn.dataset.usedesc];
      else { var bd = useBtn.querySelector('div'); text = useBtn.textContent.replace(bd ? bd.textContent : '', '').trim(); }
      if (text) {
        state.brandDesc = text;
        state.aiAssistOpen = false;
        render();
        toast(state.lang==='th'?'ใส่คำอธิบายแล้ว':'Description applied','success');
      }
    }
  });

  // no dead clicks — any button without a wired action gives feedback
  var HANDLED = '[data-go],[data-lang],[data-set],[data-set-step],[data-toggle],'
    + '[data-voice],[data-brand],[data-product],[data-archetype],[data-archeguide],[data-archeclose],'
    + '[data-addbrand],[data-delbrand],[data-aiwrite],[data-usedesc],[data-usedesc-s],[data-changelogo],[data-shopeesync],'
    + '[data-shopguide],[data-shopguideclose],[data-prodview],[data-pdclose],[data-savebrand],'
    + '[data-chconnect],[data-chdisconnect],[data-chsave],[data-chclose],'
    + '[data-filter],[data-filterclose],[data-sortby],[data-instocktoggle],'
    + '[data-gentopics],[data-topicgoal],'
    + '[data-saveproduct],[data-newimgclear],[data-newimg],[data-proddelete],[data-usetopic],[data-genall],[data-savedraft],[data-savevideodraft],[data-editdraft],[data-deletedraft],[data-schedule],[data-avatarscript],[data-veogen],[data-newavatar],'
    + '[data-uploadavatar],[data-uploadref],[data-clearref],[data-pickrefproduct],[data-refclose],[data-refpick],[data-genvideoprompt],[data-delavatar],[data-addtoday],[data-pickdraft],[data-pickdraftclose],[data-pickdraftgo],[data-tts],[data-pickfbpage],[data-avatarvideo],[data-pastevideourl],'
    + '[data-previewaspect],[data-previewidx],[data-downloadpng]';
  document.addEventListener('click', function(e){
    var b = e.target.closest('button, a');
    if (!b) return;
    if (b.closest(HANDLED)) return;            // handled by the prototype router
    var href = b.getAttribute && b.getAttribute('href');
    if (href && href[0] === '#') return;       // anchor links
    toast(state.lang==='th'
      ? 'ปุ่มนี้กำลังเชื่อมต่อระบบหลังบ้าน — เร็ว ๆ นี้'
      : 'This button is being wired to the backend — coming soon');
  });

  // boot — a returning user with a valid token lands straight in the app
  (async function(){
    if (getTok()) {
      try { await api('/api/auth/me'); state.page = 'profile'; render(); }
      catch(e){ setTok(''); }
    }
  })();
})();
</script>
</body>
</html>
