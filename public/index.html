// ====================================================================

// module (via state.js) share the SAME `window.PP.state` object. The
// pre-boot IIFE below seeds it with the full default shape; state.js's
// _initState() adopts this reference when imported. Result: no dual
// copy, no sync wrapper, no mirrorToInline() bandaid.
window.PP = window.PP || {};
window.PP.state = window.PP.state || {
  page: 'landing',         // landing | login | onboarding | profile | topics | caption | creative | avatar | textvideo | automation | analytics | calendar | library
  lang: 'th',              // th | en
  onboardStep: 1,          // 1-3
  brand: 'hp',             // active brand id
  product: 'p1',           // active product
  voice: ['friendly','fun'],
  archetype: 'sage',
  topicFilter: 'all',
  topicGenerated: true,
  genTab: 'caption',
  selectedHook: 1,
  avatar: 'mintra',
  avatarMode: 'free',      // ⚠️ DEFAULT SAFE — 'free' (no fal.ai charge). User must explicitly click "Real lip-sync" to opt-in.
  avatarLipsyncModel: 'fal-ai/bytedance/omnihuman/v1.5',  // default: OmniHuman v1.5 (face + body gestures, $0.50) — Infinitalk = face only
  ttvStyle: 0,                                          // index into the styles[] array on the Text-to-Video page (0 = Creator/UGC)
  ttvModel: 'fal-ai/wan/v2.2-a14b/text-to-video',       // default to Wan 2.2 — cheapest reliable ($0.30/clip, no quota gamble)
  ttvDuration: '8s',
  ttvAspect: '9:16',     // Veo supports 9:16 / 16:9 only
  calDay: 11,
  autoFilter: 'all',
  libraryFilter: 'all',
  channels: { facebook: true, instagram: true, tiktok: false },
  aiAssistOpen: false,
  manualOpen: false,
  aiDescs: [],
  aiDescLoading: false,
  brandDesc: '',
  shopUrl: '',
  shopScraping: false,
  shopStats: null,
  useLocalScraper: false,     // when ON, /api/shopee/scrape calls go to http://localhost:3000 directly
  localAgentAlive: null,      // null = unchecked, true/false = ping result for localhost:3000
  avatarPreviewBgUrl: '',     // looping Pexels stock video shown behind the avatar in the phone preview
  avatarPreviewBgLoaded: false, // ensures we only fetch the bg once per session/brand
  avatarBgScene: 'auto',      // picked bg scene id (auto | studio | cafe | beach | mystical | beauty | off | upload)
  avatarBgUploadUrl: '',      // dataURL of user-uploaded bg video (used when avatarBgScene==='upload')
  avatarBgLoading: false,     // true while fetching a Pexels video for the picked scene
  avatarBgCandidates: [],     // full Pexels result set (last fetch) — OEM-style thumbnail picker grid
  avatarBgPickedUrl: '',      // when user clicks a specific thumbnail, that URL is locked (overrides "first result")
  avatarBgSearch: '',         // custom free-text query (overrides scene preset when non-empty)
  avatarBgInterval: 5,        // bg rotation interval in seconds (0 = no rotation; default 5s = 6 slots for 30s clip)
  avatarBgRotateIdx: 0,       // current index in avatarBgCandidates used by the preview rotation timer
  avatarClipDuration: 30,     // total output clip length in seconds (0 = match TTS audio duration; default 30s for Reels)
  // ── Storyboard — one bg per time slot, each slot semantically matched to its script chunk ──
  avatarStoryboard: [],       // [{ idx, start_at_sec, duration_sec, script_chunk_th, bg_query_en, bg_url, preview }]
  storyboardLoading: false,   // true while /api/ai/avatar-scenes is splitting the script
  storyboardOpenSlot: -1,     // which slot's Pexels picker is expanded (-1 = none)
  storyboardSlotCands: {},    // { [slotIdx]: [pexels videos] } — cached candidate sets per slot
  storyboardSearch: {},       // { [slotIdx]: 'free-text query' } — per-slot custom search override
  hfLipsyncLoading: false,    // true while one-click HF Wav2Lip is uploading image+audio + writing URLs to clipboard
  previewAspect: '4:5',    // 1:1 | 4:5 | 9:16  — aspect for post preview + PNG download
  previewIndex: 0,         // current slide in carousel
  sidebarOpen: false,      // mobile drawer state (≤768px) — toggled by the hamburger button
  profileMenuOpen: false,  // topbar profile dropdown — opened by clicking the .profilePill
};
const state = window.PP.state;

const T = (th, en) => state.lang === 'th' ? th : en;
const t = (obj) => typeof obj === 'object' ? (state.lang === 'th' ? obj.th : obj.en) : obj;
const escText = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Phase-3e: sidebar / topbar / profile-menu are extracted to
// public/js/components/{sidebar,topbar,profile-menu}.js. The inline
// render() calls these by bare identifier — keep tiny shims that
// delegate to window.PP.* after main.js publishes the module versions.
// Before main.js loads, only state.page='landing' (public, no shell) is
// rendered, so the shims aren't exercised on first paint.
function sidebarHTML() { return (window.PP && window.PP.sidebarHTML) ? window.PP.sidebarHTML() : ''; }
function topbarHTML()  { return (window.PP && window.PP.topbarHTML)  ? window.PP.topbarHTML()  : ''; }
function profileMenuHTML() { return (window.PP && window.PP.profileMenuHTML) ? window.PP.profileMenuHTML() : ''; }

}

const productImgHTML = (p, opts={}) => {

  }

  return `<div class="productImg" style="background:linear-gradient(135deg,${hue[0]},${hue[1]})">

    <div class="pLabel">${p.label || (p.name_en||p.name_th||'·').slice(0,8)}</div>
    ${badge}

};

function postPreviewHTML() {
  var ab = BRANDS.find(b=>b.id===state.brand) || BRANDS[0];
  var hookObj = (state.genHooks||[])[((state.selectedHook||1)-1)];
  var imgs = (state.genImages||[]).filter(Boolean);
  var n = imgs.length;
  var idx = Math.min(Math.max(0, state.previewIndex||0), Math.max(0, n-1));
  var aspect = state.previewAspect || '4:5';
  var aspectCss = { '1:1':'1/1', '4:5':'4/5', '9:16':'9/16' }[aspect] || '4/5';
  var tabs = ['1:1','4:5','9:16'].map(function(a){
    return '<button class="tab '+(aspect===a?'active':'')+'" data-previewaspect="'+a+'" style="padding:5px 10px">'+a+'</button>';
  }).join('');
  var imageBlock;
  if (n > 0) {
    var dots = '';
    if (n > 1) {
      dots = '<div style="position:absolute;left:0;right:0;bottom:8px;display:flex;justify-content:center;gap:5px;z-index:2">'
        + imgs.map(function(_, i){
            return '<button data-previewidx="'+i+'" style="border:0;width:7px;height:7px;border-radius:99px;background:'+(i===idx?'#fff':'rgba(255,255,255,.55)')+';box-shadow:0 0 0 1px rgba(0,0,0,.2);cursor:pointer;padding:0"></button>';
          }).join('')
        + '</div>';
    }
    var navBtns = '';
    if (n > 1) {
      var prev = (idx - 1 + n) % n, next = (idx + 1) % n;
      navBtns =
          '<button data-previewidx="'+prev+'" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:99px;border:0;background:rgba(255,255,255,.85);display:grid;place-items:center;cursor:pointer;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.18)">'+I('chev_left',14)+'</button>'
        + '<button data-previewidx="'+next+'" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:99px;border:0;background:rgba(255,255,255,.85);display:grid;place-items:center;cursor:pointer;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.18)">'+I('chev_right',14)+'</button>'
        + '<div style="position:absolute;top:8px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;z-index:2">'+(idx+1)+' / '+n+'</div>';
    }
    imageBlock = '<div style="position:relative;aspect-ratio:'+aspectCss+';background:#f3f0ea;overflow:hidden">'
      + '<img src="'+imgs[idx]+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block"/>'
      + navBtns + dots
      + '</div>';
  } else {
    imageBlock = '<div style="aspect-ratio:'+aspectCss+';background:linear-gradient(135deg,#FFF4E6,#FED7AA 50%,#FECDD3);display:grid;place-items:center;text-align:center;padding:20px;color:#9A3412"><div>'+I('image',32,'#C2693B')+'<div style="font-size:11px;margin-top:8px;font-weight:600">'+T('รูปจะแสดงที่นี่เมื่อสร้าง Creative','Your image appears here')+'</div></div></div>';
  }
  return `<div class="card">
    <div class="cardHeader">
      <h3 class="cardTitle">${T('ตัวอย่างโพสต์','Post preview')}</h3>
      <div class="tabs" style="padding:3px">${tabs}</div>
    </div>
    <div style="border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)">
        <div style="width:32px;height:32px;border-radius:99px;overflow:hidden;background:${ab?ab.color:'#FB923C'};display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px">${ab?brandMark(ab):'P'}</div>
        <div><div style="font-size:12.5px;font-weight:700;color:var(--purple)">${ab?escText(ab.name):'Brand'}</div><div style="font-size:10px;color:var(--muted)">${T('ตัวอย่างโพสต์ · เดี๋ยวนี้','Preview · just now')}</div></div>
      </div>
      ${imageBlock}
      <div style="padding:12px 14px">
        ${hookObj?`<div style="font-size:13px;font-weight:800;color:var(--ink);margin-bottom:6px;line-height:1.5">${escText(hookObj.text)}</div>`:''}
        ${state.genCaption

(function migrateStaleSkinTopics(){
  try {

    var changed = false;
    BRANDS.forEach(function(b){
      if (b.id === 'happyprice') return;        // seed brand keeps its demo
      if (Array.isArray(b.topics) && b.topics.length) {
        var firstTopic = b.topics[0];
        var sample = (firstTopic && (firstTopic.th || firstTopic.en)) || '';
        if (SKIN_KW.test(sample)) {
          console.log('[migrate] wiping stale skincare topics from brand:', b.id);
          b.topics = [];

      if (Array.isArray(b.products) && b.products.length) {

          changed = true;

      }

    if (!Array.isArray(state.selectedProducts)) state.selectedProducts = [];
    const si = state.selectedProducts.indexOf(pid);
    if (si >= 0) state.selectedProducts.splice(si, 1);
    else state.selectedProducts.push(pid);
    render();
    return;
  }
  const archeEl = e.target.closest('[data-archetype]');
  if (archeEl) {
    e.preventDefault();
    state.archetype = archeEl.dataset.archetype;
    console.log('[archetype] picked:', state.archetype);
    const _aab = BRANDS.find(b => b.id === state.brand);
    if (_aab) {
      _aab.archetype = state.archetype;
      // Same dirty-field guard as the voice handler — see comment there.
      try {
        window.__ppDirtyFields = window.__ppDirtyFields || {};
        window.__ppDirtyFields[_aab.id] = window.__ppDirtyFields[_aab.id] || {};
        window.__ppDirtyFields[_aab.id].archetype = true;
      } catch(_) {}
      try { window.PP && window.PP.track && window.PP.track('archetype_changed', { brandId: _aab.id, archetype: _aab.archetype }); } catch(_){}
      console.log('[archetype] mutated brand', _aab.id, '· _aab.archetype =', _aab.archetype);
      try {
        localStorage.setItem('postpost_brands', JSON.stringify(BRANDS));
        console.log('[archetype] ✓ localStorage saved');
      } catch(saveErr){ console.warn('[archetype] ✗ localStorage failed:', saveErr.message); }
      const hasSched = !!(window.PP && window.PP.schedCloudPush);
      console.log('[archetype] window.PP.schedCloudPush available?', hasSched);
      try { (window.PP && window.PP.schedCloudPush || function(){})(); } catch(pushErr){ console.warn('[archetype] ✗ schedCloudPush threw:', pushErr.message); }
    } else {
      console.warn('[archetype] ✗ no active brand — state.brand =', state.brand);
    }
    render();
    return;
  }
  const tabEl = e.target.closest('[data-set]');
  if (tabEl) {
    e.preventDefault();
    const [k, v] = tabEl.dataset.set.split('=');
    state[k] = isNaN(+v) ? v : +v;
    // When user switches Talking-Avatar mode from Real → Audio-reactive,
    // clear any cached fal.ai lipsync URL — otherwise the canvas compositor
    // keeps using the stale URL and the user wonders why a "free" render
    // still produces a chroma-keyed lipsync output. (Reported by user
    // looking at audio-reactive mode but seeing the fal.ai composite reused.)
    if (k === 'avatarMode' && v === 'free') {
      state.avatarLipsyncRawVideo = '';
    }
    render();
    return;
  }
  const toggleEl = e.target.closest('[data-toggle]');
  if (toggleEl) {
    e.preventDefault();
    const k = toggleEl.dataset.toggle;
    if (k.startsWith('ch:')) {
      const ch = k.slice(3);
      state.channels[ch] = !state.channels[ch];
    } else {
      state[k] = !state[k];
    }
    render();
    return;
  }
});

<script>
(function(){
  var API = '', KEY = 'postpost_token';
  var getTok = function(){ try { return localStorage.getItem(KEY) || ''; } catch(e){ return ''; } };
  var setTok = function(t){ try { t ? localStorage.setItem(KEY,t) : localStorage.removeItem(KEY); } catch(e){} };

  function toast(msg, kind){
    var d = document.createElement('div');
    d.textContent = msg;
    var bar = kind==='error' ? '#DC2626' : kind==='success' ? '#16A34A' : '#FF7A1A';
    d.style.cssText = 'position:fixed;right:20px;bottom:20px;z-index:99999;background:#fff;'
      + 'border:1px solid #E9DCCB;border-left:3px solid '+bar+';border-radius:12px;padding:12px 16px;'
      + 'font:600 13px/1.45 Prompt,sans-serif;color:#261447;box-shadow:0 12px 34px rgba(38,20,71,.18);max-width:360px';
    document.body.appendChild(d);
    setTimeout(function(){ d.style.transition='opacity .3s'; d.style.opacity='0';
      setTimeout(function(){ d.remove(); }, 320); }, 3800);
  }

  async function api(path, opts){
    opts = opts || {};
    var h = {};
    if (opts.body !== undefined) h['Content-Type'] = 'application/json';
    var tk = getTok();
    if (tk) h['Authorization'] = 'Bearer ' + tk;
    var fullUrl = API + path;
    var method = opts.method || 'GET';
    var res;
    try {
      res = await fetch(fullUrl, {
        method: method, headers: h,
        body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined,
      });
    } catch(e){ throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'); }
    var data = null;
    try { data = await res.json(); } catch(e){}
    if (!res.ok) {
      // Log the exact failing URL + method to the console so 404s show their source
      // (was opaque before — "Failed to load resource" with no url in the browser default log).
      console.warn('[api] ' + method + ' ' + path + ' → ' + res.status + ' ' + res.statusText, data || '');
      throw new Error((data && (data.message || data.error)) || (res.status + ' ' + res.statusText));
    }
    return data;
  }

  // expose for later page wiring — Object.assign to preserve everything
  // script 1's pre-boot put on window.PP (state, PAGES, etc.)
  window.PP = Object.assign(window.PP || {}, { api: api, token: { get: getTok, set: setTok }, toast: toast });

  // wrap the prototype's render() to keep the login form usable
  var _render = render;
  render = function(){
    _render();
    if (state.page === 'login') {
      var f = document.querySelector('.authForm');
      if (f) {
        var em = f.querySelector('input[type=email]');
        var pw = f.querySelector('input[type=password]');
        if (em && em.value === 'poy@happyprice.sh') em.value = 'admin@oemcontent.co';
        if (pw && pw.value.indexOf('•') >= 0) pw.value = 'ChangeMe123!';
      }
    }
  };

  async function doLogin(){
    var f = document.querySelector('.authForm'); if (!f) return;
    var em = (f.querySelector('input[type=email]') || {}).value || '';
    var pw = (f.querySelector('input[type=password]') || {}).value || '';
    // Validate inputs with SPECIFIC messages so the user knows what's missing
    if (!em) { toast(state.lang==='th'?'⚠ กรอกอีเมลก่อน':'⚠ Enter your email first', 'error'); return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { toast(state.lang==='th'?'⚠ รูปแบบอีเมลไม่ถูกต้อง':'⚠ Invalid email format', 'error'); return; }
    if (!pw) { toast(state.lang==='th'?'⚠ กรอกรหัสผ่านก่อน':'⚠ Enter your password first', 'error'); return; }
    if (pw.indexOf('•') >= 0) { toast(state.lang==='th'?'⚠ รหัสผ่านยังเป็นจุดๆ — ลบออกแล้วพิมพ์รหัสจริง':'⚠ Password still has placeholder dots — clear and type real password', 'error'); return; }
    if (pw.length < 4) { toast(state.lang==='th'?'⚠ รหัสผ่านสั้นเกินไป (>=4 ตัว)':'⚠ Password too short (>=4 chars)', 'error'); return; }
    toast(state.lang==='th'?'⏳ กำลังเข้าสู่ระบบ…':'⏳ Signing in…');
    try {
      var d = await api('/api/auth/login', { method:'POST', body:{ email: em, password: pw } });
      if (!d || !d.token) throw new Error('no token in response');
      setTok(d.token);
      state.page = 'profile'; render();
      toast(state.lang==='th'?'✓ เข้าสู่ระบบสำเร็จ':'✓ Signed in','success');
    } catch(e){
      console.error('[login] failed:', e);
      var msg = e.message || 'unknown error';
      // Common backend errors — surface friendlier hints
      if (/401|unauthor/i.test(msg)) msg = state.lang==='th'?'อีเมลหรือรหัสผ่านไม่ถูกต้อง':'Wrong email or password';
      else if (/404/.test(msg)) msg = state.lang==='th'?'ยังไม่มีบัญชี — กดสมัครก่อน':'No account yet — sign up first';
      else if (/500|502|503/.test(msg)) msg = state.lang==='th'?'เซิร์ฟเวอร์มีปัญหา — ลองอีกครั้งใน 1 นาที':'Server issue — try again in 1 min';
      else if (/network|fetch/i.test(msg)) msg = state.lang==='th'?'เน็ตขัด หรือ Vercel ตอบไม่ทัน':'Network issue or Vercel timeout';
      toast((state.lang==='th'?'✗ เข้าสู่ระบบไม่สำเร็จ — ':'✗ Sign-in failed: ') + msg, 'error');
    }
  }

  // capture-phase click — intercept auth before the prototype router runs
  document.addEventListener('click', function(e){
    var go = e.target.closest('[data-go]');
    if (!go) return;
    var dest = go.dataset.go;
    if (state.page === 'login' && dest === 'onboarding') {

    }

  // Manual product — add / delete, persisted to the active brand
  function deleteProduct(id){

    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];

    render();

  function addManualProduct(mode){
    var nameEl = document.getElementById('ppNewName');
    var priceEl = document.getElementById('ppNewPrice');
    var beforeEl = document.getElementById('ppNewBefore');
    var catEl = document.getElementById('ppNewCat');
    var descEl = document.getElementById('ppNewDesc');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) { toast(state.lang==='th'?'กรอกชื่อสินค้าก่อน':'Enter a product name','error'); return; }
    var price = Math.round(parseFloat(priceEl && priceEl.value) || 0);
    if (!price) { toast(state.lang==='th'?'กรอกราคาก่อน':'Enter a price','error'); return; }
    var before = Math.round(parseFloat(beforeEl && beforeEl.value) || 0);
    var img = state.newProductImg || '';
    var prod = {
      id: 'mp' + Date.now(),
      name_th: name, name_en: name, short: name.slice(0,30),
      price: price, priceBefore: before,
      sales: '0', sold: 0, rating: 0, stock: 0,
      thumbnail: img, images: img ? [img] : [], url: '',
      description: descEl ? descEl.value.trim() : '',
      category: catEl ? catEl.value : '', label: '', manual: true,
    };
    PRODUCTS = PRODUCTS.concat([prod]);
    state.selectedProducts = (state.selectedProducts||[]).concat([prod.id]);
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
    if (ab) { ab.products = PRODUCTS; saveBrands(); }

  // Save the brand-profile form into the active brand + persist to localStorage
  function saveBrandProfile(){
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0] || BRANDS[0];
    if (!ab) return;
    var nameEl = document.getElementById('ppBrandNameEdit');

    ab.name = name;
    if (!ab.logo) ab.mark = name.replace(/\s+/g,'').slice(0,2).toUpperCase();
    if (bizEl)  ab.bizType = bizEl.value;
    // reflect the business type in the brand tile / header subtitle
    var bt = BUSINESS_TYPES.filter(function(x){ return x.th===ab.bizType || x.en===ab.bizType; })[0];
    if (bt) { ab.sub_th = bt.th; ab.sub_en = bt.en; }
    if (descEl) ab.desc = descEl.value.trim();
    ab.voice = Array.isArray(state.voice) ? state.voice.slice() : [];

  // Keep the brand-profile form in sync as the user types/selects, so a
  // re-render (e.g. clicking "AI write") never wipes unsaved field values.
  // Auto-persist via debounced saveBrands() — no manual "บันทึก" needed.
  function liveBrand(){ return BRANDS.filter(function(b){ return b.id===state.brand; })[0]; }
  // Debounced brand-save — fires 600ms after the last keystroke. Avoids
  // hammering localStorage + cloud-sync on every character typed but still
  // persists fast enough that switching brand can't lose unsaved edits.
  var _brandSaveTimer = null;
  function scheduleBrandSave(){
    if (_brandSaveTimer) clearTimeout(_brandSaveTimer);
    _brandSaveTimer = setTimeout(function(){
      // Use inline saveBrands (in script-2 IIFE scope) — it serializes the inline
      // BRANDS array + calls inline schedCloudPush. Routing through window.PP.saveBrands
      // would hit the module copy which can diverge from inline after cloudPullOnBoot.
      try { saveBrands(); } catch(_){}
    }, 600);
  }
  document.addEventListener('input', function(e){
    var t = e.target; if (!t || !t.id) return;
    if (t.id==='ppTopicTheme') { state.topicTheme = t.value; return; }
    if (t.id==='ppTopicCount') { state.topicCount = t.value; return; }
    if (t.id==='ppGenTopic') { state.selectedTopic = t.value; return; }
    if (t.id==='ppAvatarScript') { state.avatarScript = t.value; return; }
    if (t.id==='ppAvatarBgSearch') { state.avatarBgSearch = t.value; return; }
    if (t.id==='ppTtvPrompt') { state.ttvPrompt = t.value; return; }
    var ab = liveBrand(); if (!ab) return;
    if (t.id==='ppBrandNameEdit') { ab.name = t.value; scheduleBrandSave(); }
    else if (t.id==='ppBrandDesc') { ab.desc = t.value; state.brandDesc = t.value; scheduleBrandSave(); }
  });
  document.addEventListener('change', function(e){
    var t = e.target;
    if (t && t.id==='ppBizType') {
      var ab = liveBrand();
      if (ab) {
        ab.bizType = t.value;
        // bizType is a select → fires once on change, save immediately (no debounce needed).
        // Use inline saveBrands — same divergence reason as the debounced scheduleBrandSave above.
        try { saveBrands(); } catch(_){}
      }
      return;
    }
    if (t && t.id==='ppGenTone') { state.genTone = t.value; return; }
    if (t && t.id==='ppGenLang') { state.genLang = t.value; return; }
    if (t && t.id==='ppGenLength') { state.genLength = t.value; return; }
    if (t && t.id==='ppImageModel') { state.imageModel = t.value; return; }
    if (t && t.id==='ppImageCount') { state.imageCount = parseInt(t.value,10)||4; return; }
    if (t && t.id==='ppAvatarVoice') { state.avatarVoice = t.value; return; }
    if (t && t.id==='ppTopicBrand') {
      state.brand = t.value;
      try { localStorage.setItem('postpost_active_brand', state.brand); } catch(_){}
      var nb = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
      if (nb) {
        state.brandDesc = nb.desc || '';
        state.voice = Array.isArray(nb.voice) ? nb.voice.slice() : [];
        state.archetype = nb.archetype || '';
        TOPICS = (function(){
        // Defense in depth: even if nb.topics survives migration, filter at read time.
        // If brand isn't happyprice AND the first saved topic mentions a known skincare
        // keyword → ignore the cloud/local cache and start fresh (empty state → user gens new).
        var saved = Array.isArray(nb.topics) ? nb.topics : null;
        if (saved && saved.length && nb.id !== 'happyprice') {
          // Scan ALL topics (not just [0]) — stale skincare leaked through.
          var SKIN_RE2 = /Marine Collagen|สกินแคร์|skincare|ผิวบอบบาง|Sheet Mask|Rose Repair|Bio Astin|Bovine Collagen|คอลลาเจน|เซรั่ม|กุหลาบเขาใหญ่|iCON Face|BellaCare|Amado|JOJU|Linhzhimin|Kumiko|Mahad/i;
          var hasSkin2 = saved.some(function(t){ return SKIN_RE2.test((t && (t.th || t.en)) || ''); });
          if (hasSkin2) {
            console.log('[topics] read-time filter — ignoring stale skincare topics for brand:', nb.id);
            nb.topics = [];
            saved = null;
          }
        }
        return (saved && saved.length) ? saved : (nb.id === 'happyprice' ? DEMO_TOPICS : []);
      })();
        PRODUCTS = (Array.isArray(nb.products) && nb.products.length) ? nb.products : (nb.id === 'happyprice' ? DEMO_PRODUCTS : []);
        // Mirror reassignment into module's array (see same comment above).
        try { window.PP && window.PP.setTopics && window.PP.setTopics(TOPICS); } catch(_){}
        try { window.PP && window.PP.setProducts && window.PP.setProducts(PRODUCTS); } catch(_){}
        state.selectedProducts = PRODUCTS.map(function(p){ return p.id; });
        state.shopStats = nb.shopStats || null;
        state.shopUrl = nb.shopUrl || '';
      }
      render();
    }
  });

  // Boot — restore the last-active brand + its last-scraped catalog (survives reloads)
  (function(){
    try {
      var sb = localStorage.getItem('postpost_active_brand');
      if (sb && BRANDS.some(function(b){ return b.id===sb; })) state.brand = sb;
    } catch(e){}
    try {
      var _dr = localStorage.getItem('postpost_drafts');
      if (_dr) state.drafts = JSON.parse(_dr) || [];
    } catch(e){}
    try {
      // Custom presenters (AI-generated portraits + uploaded photos) survive across sessions
      var _ca = localStorage.getItem('postpost_custom_avatars');
      if (_ca) state.customAvatars = JSON.parse(_ca) || [];
    } catch(e){}
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
    if (ab){
      state.voice = Array.isArray(ab.voice) ? ab.voice.slice() : [];
      state.brandDesc = ab.desc || '';
      state.archetype = ab.archetype || '';
      // Boot fallback: use DEMO_TOPICS only for the original HappyPrice seed brand;
      // other brands (e.g. คุรุเทพ) start empty so they don't show skincare topics.
      // Also scan ALL ab.topics for skincare leftovers before adopting them —
      // a stale cache can carry Marine Collagen / Rose Repair into a brand
      // that has nothing to do with skincare.
      var _bootSkinRe = /Marine Collagen|สกินแคร์|skincare|ผิวบอบบาง|Sheet Mask|Rose Repair|Bio Astin|Bovine Collagen|คอลลาเจน|เซรั่ม|กุหลาบเขาใหญ่|iCON Face|BellaCare|Amado|JOJU|Linhzhimin|Kumiko|Mahad/i;
      var _bootTopics = Array.isArray(ab.topics) ? ab.topics : null;
      if (_bootTopics && _bootTopics.length && ab.id !== 'happyprice') {
        var _bootHasSkin = _bootTopics.some(function(t){ return _bootSkinRe.test((t && (t.th || t.en)) || ''); });
        if (_bootHasSkin) {
          console.log('[boot] dropped stale skincare topics for brand:', ab.id);
          ab.topics = [];
          _bootTopics = null;
        }
      }
      if (_bootTopics && _bootTopics.length) TOPICS = _bootTopics;
      else if (ab.id !== 'happyprice') TOPICS = [];
    }
    if (ab && Array.isArray(ab.products) && ab.products.length){
      PRODUCTS = ab.products;
      state.selectedProducts = PRODUCTS.map(function(p){ return p.id; });
      state.shopStats = ab.shopStats || null;
      if (ab.shopUrl) state.shopUrl = ab.shopUrl;
    }
  })();

  // Per-brand channel connection — Facebook / Instagram / TikTok
  // OAuth popup launcher — opens the real provider login dialog in a child window,
  // listens for postMessage from our /api/.../oauth/callback page, then saves the
  // returned page/account into the active brand's channelInfo.
  // Facebook OAuth grants both pages_* and instagram_* scopes, so connecting "facebook"
  // auto-detects + connects the linked Instagram Business account too.
  function connectChannelOAuth(key){
    var L = function(th,en){ return state.lang==='th'?th:en; };
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
    if (!ab) return;
    var providerLabel = ({ facebook:'Facebook', instagram:'Instagram', tiktok:'TikTok' })[key] || key;

    // Open the OAuth start URL in a popup. The popup itself drives the user through
    // login → consent → callback → postMessage back to this window.
    var url;
    if (key === 'tiktok') {
      // state suffix .POPUP makes the backend callback postMessage instead of showing the success page
      url = '/api/tiktok/oauth/start?state_suffix=POPUP&brand=' + encodeURIComponent(ab.id);
    } else {
      // facebook + instagram share the same FB OAuth (IG Business attaches to FB Page)
      url = '/api/facebook/oauth/start?brand=' + encodeURIComponent(ab.id);
    }
    var w = 600, h = 720;
    var left = (window.outerWidth - w) / 2 + (window.screenX || 0);
    var top  = (window.outerHeight - h) / 2 + (window.screenY || 0);
    var popup = window.open(url, 'pp-oauth-' + key, 'width='+w+',height='+h+',left='+Math.max(0,left)+',top='+Math.max(0,top)+',scrollbars=yes');
    if (!popup) { toast(L('Browser block popup — เปิด popup ของเว็บนี้ก่อน','Popup blocked — allow popups'),'error'); return; }

    toast(L('กำลังเปิดหน้าต่าง '+providerLabel+'…','Opening '+providerLabel+'…'));

    function onMsg(ev){
      // Same-origin check — Facebook/TikTok's redirect lands on our domain
      if (ev.origin !== location.origin) return;
      var d = ev.data || {};
      if (d.type === 'pp-fb-oauth')       handleFbOAuth(d.payload, key, ab);
      else if (d.type === 'pp-fb-oauth-error') { toast(L('เชื่อมต่อไม่สำเร็จ: ','Failed: ')+(d.message||''),'error'); }
      else if (d.type === 'pp-tt-oauth')  handleTikTokOAuth(d.payload, ab);
      else return;
      window.removeEventListener('message', onMsg);
    }
    window.addEventListener('message', onMsg);

    // Safety net — if the user just closes the popup without finishing, stop listening after 5 min
    setTimeout(function(){ window.removeEventListener('message', onMsg); }, 5 * 60 * 1000);
  }

  async function genAvatarScript(){
    if (state.avatarScriptLoading) return;
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];

    var topic = (state.selectedTopic||'').trim();

      state.selectedTopic = topic;
    }
    var voiceLabels = (state.voice||[]).map(function(id){
      var v = (typeof VOICES!=='undefined'?VOICES:[]).filter(function(x){ return x.id===id; })[0];
      return v ? (state.lang==='th'?v.th:v.en) : id;
    });
    var arch = (typeof ARCHETYPES!=='undefined'?ARCHETYPES:[]).filter(function(a){ return a.id===state.archetype; })[0];
    // Look up the picked TTS voice so we can pass its gender + persona to the AI —
    // without this the script comes out with the wrong ending particles (ค่ะ vs ครับ)
    // and ignores the persona ("Niwat — professional · business · finance" etc.)
    var picked = (state.avatarVoices||[]).filter(function(x){ return x.id===(state.avatarVoice||'premwadee'); })[0];
    var voiceGender = picked ? (picked.g==='ชาย' ? 'male' : 'female') : 'female';
    var voicePersona = picked ? (picked.name + ' — ' + picked.tone + ' (' + picked.desc + ')') : '';
    state.avatarScriptLoading = true; render();
    toast(state.lang==='th'?'AI กำลังเขียนสคริปต์…':'AI is writing the script…');
    try {
      // Pass the user-picked clip duration so AI sizes the script to fit (defaults to 30s for Reels).
      var targetDur = state.avatarClipDuration > 0 ? state.avatarClipDuration : 30;
      var j = await api('/api/ai/avatar-script-brand', { method:'POST', body:{
        brandName: ab.name, businessType: ab.bizType||'', brandDesc: ab.desc||state.brandDesc||'',
        voices: voiceLabels, archetype: arch?(state.lang==='th'?arch.th:arch.en):'',
        topic: topic, duration_sec: targetDur,
        voice_gender: voiceGender,
        voice_persona: voicePersona,

    } finally {
      state.avatarScriptLoading = false; render();

  async function genStoryboard(){
    if (state.storyboardLoading) return;
    var script = (state.avatarScript||'').trim();
    if (!script) { toast(state.lang==='th'?'เขียนสคริปต์ก่อน':'Write a script first','error'); return; }
    var dur = state.avatarClipDuration || Math.max(15, Math.round(script.length / 15));
    var ivl = state.avatarBgInterval || 0;
    var nSlots = (ivl > 0) ? Math.max(1, Math.ceil(dur / ivl)) : 1;
    state.storyboardLoading = true; state.storyboardOpenSlot = -1; render();
    toast(state.lang==='th'?('AI กำลังแยกสคริปต์เป็น '+nSlots+' ฉาก…'):('AI splitting script into '+nSlots+' scenes…'));
    try {
      var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
      var course = /ดูดวง|สายมู|tarot/.test((ab&&ab.bizType||'').toLowerCase()) ? 'GURU' : 'PFB';
      var r = await api('/api/ai/avatar-scenes', { method:'POST', body:{ script: script, n_scenes: nSlots, course: course } });
      var scenes = (r && r.scenes) || [];
      if (!scenes.length) throw new Error('AI returned 0 scenes');
      // Normalize: ensure each slot has duration = ivl (or split duration if ivl=0)
      var even = (ivl > 0) ? ivl : Math.round(dur / scenes.length);
      // Split the script into N approximately-equal chunks aligned to the slots
      var chunks = splitScriptIntoChunks(script, scenes.length);
      var slots = scenes.map(function(sc, i){
        return {
          idx: i,
          start_at_sec: i * even,
          duration_sec: (i === scenes.length-1) ? Math.max(2, dur - i*even) : even,
          script_chunk_th: chunks[i] || '',
          bg_query_en: sc.bg_query_en || 'lifestyle aesthetic',
          bg_url: '',
          preview: '',
          title_thai: sc.title_thai || '',
        };
      });
      state.avatarStoryboard = slots;
      state.storyboardSlotCands = {};
      state.storyboardSearch = {};
      render();
      // Fetch a Pexels bg for each slot in parallel — best-effort, render() each time one lands
      slots.forEach(function(s, i){
        api('/api/ai/pexels-video-search?q=' + encodeURIComponent(s.bg_query_en) + '&per_page=4&orientation=portrait')
          .then(function(rp){
            var vids = (rp && rp.videos) || [];
            state.storyboardSlotCands[i] = vids;
            if (vids.length && vids[0].url) {
              state.avatarStoryboard[i].bg_url = vids[0].url;
              state.avatarStoryboard[i].preview = vids[0].preview || '';
              // Also mirror the first slot's bg into the live phone preview
              if (i === 0) state.avatarPreviewBgUrl = vids[0].url;
            }
            render();
          })
          .catch(function(){ /* skip — leaves bg_url empty, gradient fallback at render time */ });
      });
      toast(state.lang==='th'?('Storyboard พร้อม — '+slots.length+' ฉาก ✓'):('Storyboard ready — '+slots.length+' scenes ✓'),'success');
    } catch(e){
      toast((state.lang==='th'?'จัด storyboard ไม่สำเร็จ: ':'Storyboard failed: ')+(e.message||''),'error');
    } finally {
      state.storyboardLoading = false; render();
    }
  }
  // Split a Thai script into N approximately-equal chunks by sentence/clause boundary.
  // Strategy: tokenize on punctuation + Thai sentence-ender particles, then re-group
  // tokens into N buckets of ~equal total character count.
  function splitScriptIntoChunks(script, n) {
    script = String(script||'').trim();
    if (n <= 1) return [script];
    // Forward-match sentence-ish chunks ending in punctuation or Thai particles.
    // No lookbehind — keeps parser-compat with older script-check tools.
    var sentenceRe = new RegExp('[^.!?\\n]+?(?:[.!?]+|ครับ|ค่ะ|นะคะ|นะครับ|$)', 'g');
    var matches = script.match(sentenceRe) || [];
    var tokens = matches.map(function(s){ return s.trim(); }).filter(Boolean);
    if (tokens.length < n) {
      // Fall back to even char split with word-boundary awareness
      var step = Math.ceil(script.length / n);
      var out = [], i = 0;
      while (i < script.length && out.length < n) {
        var end = Math.min(script.length, i + step);
        if (end < script.length) {
          var sp = script.lastIndexOf(' ', end);
          if (sp > i + step * 0.6) end = sp;
        }
        out.push(script.slice(i, end).trim());
        i = end;
      }
      while (out.length < n) out.push('');
      return out;
    }
    // Re-group tokens into N buckets of ~equal total length
    var target = script.length / n;
    var buckets = [];
    var current = '', curLen = 0;
    tokens.forEach(function(s){
      if (curLen >= target && buckets.length < n - 1) {
        buckets.push(current.trim()); current = ''; curLen = 0;
      }
      current += s + ' ';
      curLen += s.length;
    });
    if (current) buckets.push(current.trim());
    while (buckets.length < n) buckets.push('');
    return buckets.slice(0, n);
  }

  // Create a new presenter portrait with AI (Gemini image gen)
  // Compress an avatar image down to a smaller JPEG so a handful fit in localStorage's 5 MB quota.
  // 480 px is plenty for the small tiles + future TTS preview frame.
  async function compressAvatarImage(src){
    try { return await compressImageDataUrl(src, 480, 0.82); }

  function saveCustomAvatars(){
    try { localStorage.setItem('postpost_custom_avatars', JSON.stringify(state.customAvatars||[])); }
    catch(e){
      // If quota was hit, drop the oldest and try again. Compression usually keeps us well under,
      // but a user with many uploads might still fill up — surface a friendly error.
      try {
        var arr = (state.customAvatars||[]).slice();
        if (arr.length > 1) { arr.shift(); state.customAvatars = arr; localStorage.setItem('postpost_custom_avatars', JSON.stringify(arr)); }
      } catch(_){
        toast(state.lang==='th'?'พื้นที่เก็บใกล้เต็ม — บันทึกผู้บรรยายไม่สำเร็จ':'Storage full — could not save presenter','error');
      }
    }
    if (typeof schedCloudPush === 'function') schedCloudPush();
  }
  // Hook all draft localStorage writes to also schedule a cloud push.
  // Patches localStorage.setItem so any 'postpost_drafts'/'postpost_active_brand' write
  // also triggers schedCloudPush() — keeps cloud + local mirror in sync without
  // touching every single setItem call site.
  (function(){
    if (typeof localStorage === 'undefined') return;
    var origSet = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, val){
      origSet(key, val);
      if (typeof schedCloudPush !== 'function') return;
      if (key === 'postpost_drafts' || key === 'postpost_active_brand'
          || key === 'postpost_brands' || key === 'postpost_custom_avatars') {
        schedCloudPush();
      }
    };
  })();
  async function addCustomAvatar(av){

  function deleteCustomAvatar(id){

  // 🔊 Synthesize the avatar script with Azure TTS — picks the right Thai voice from the

  async function genTts(){
    if (state.ttsLoading) return;
    var scriptEl = document.getElementById('ppAvatarScript');

    if (!text) { toast(state.lang==='th'?'ใส่สคริปต์ก่อน':'Add a script first','error'); return; }

    var voice = picked && picked.az ? picked.az : 'th-TH-PremwadeeNeural';
    state.ttsLoading = true; render();
    toast(state.lang==='th'?'Azure กำลังสังเคราะห์เสียง…':'Azure synthesizing…');

      var j = await api('/api/ai/tts', { method:'POST', body:{ text: text, voice: voice } });
      if (!j || !j.audio_base64) throw new Error((j&&j.error) || 'no audio returned');
      state.ttsAudio = 'data:'+(j.mime||'audio/mp3')+';base64,'+j.audio_base64;

      // updates while the video is being recorded) must NOT restart playback.
      state.ttsAutoplayPending = true;
      toast(state.lang==='th'?('เสียงพร้อม — ~'+(j.duration_estimate_sec||0)+' วินาที ✓'):('Audio ready ✓'),'success');
    } catch(e){

      } else {
        toast((state.lang==='th'?'สังเคราะห์เสียงไม่สำเร็จ: ':'Failed: ')+msg, 'error');
      }
    } finally {
      state.ttsLoading = false; render();
    }
  }

  // 🎬 Talking Avatar video — tries fal.ai lip-sync first (real mouth movement),
  // falls back to client-side canvas (static avatar + audio) if FAL_KEY isn't set.
  async function genAvatarVideo(){
    if (state.avatarVideoLoading) return;
    var ab = BRANDS.filter(function(b){ return b.id===state.brand; })[0];
    if (!ab) return;
    // Require TTS audio first — render() flow is: pick voice + script → "ฟังเสียง" → then create video
    if (!state.ttsAudio) {
      toast(state.lang==='th'?'กด "ฟังเสียง" ก่อน — สร้างเสียง TTS เสร็จแล้วค่อยสร้างวิดีโอ':'Generate TTS audio first','error');
      return;
    }
    // Find picked avatar's image
    var all = (typeof AVATARS!=='undefined'?AVATARS:[]).concat(state.customAvatars||[]);
    var picked = all.filter(function(a){ return a.id===state.avatar; })[0];
    if (!picked || !picked.image) {
      toast(state.lang==='th'?'เลือก avatar ที่มีรูป (ไม่ใช่ตัวอักษร) หรืออัปโหลด/สร้างใหม่ด้วย AI':'Pick an avatar with an image','error');
      return;
    }
    state.avatarVideoLoading = true; state.avatarVideoProgress = 0;
    // Pause the preview <audio> before anyone hears two voices at once.
    // (The next render will replace the audio element with the "locked" notice anyway,
    // but pausing here avoids the brief overlap between this paint and the render() call.)
    try { var _prevA = document.getElementById('ppTtsAudio'); if (_prevA) { _prevA.pause(); _prevA.currentTime = 0; } } catch(_){}
    render();

    // ── BYPASS A: user already pasted a fal.ai output URL ───────────────
    // Skip the entire backend lipsync-submit + poll loop. Jump straight to
    // the canvas compositor (which reads state.avatarLipsyncRawVideo).
    if (state.avatarLipsyncRawVideo && /^https?:\/\//.test(state.avatarLipsyncRawVideo)) {
      toast(state.lang==='th'?'⚡ ใช้ URL ที่วางไว้ — ข้าม fal.ai backend ไปประกอบกับ bg เลย':'⚡ Using pasted URL — skipping backend, going straight to bg composite','success');
      // Fall through — the canvas compositor below already checks
      // state.avatarLipsyncRawVideo and uses it as the avatar source.
    } else if (state.avatarMode === 'hfree') {
      // ── GUARD: HF Spaces (free real) mode requires a pasted URL ─────
      // User picked the free-real path but hasn't run the HF Space + pasted
      // the result yet. Don't silently fall back to audio-reactive — that
      // produces a clip with no real lipsync, defeating the user's choice.
      toast(state.lang==='th'?'⚠️ ยังไม่ได้วาง URL ผลลัพธ์จาก HF Space — กด ⚡ "ใช้เลย" บนโมเดลด้านบน แล้ววาง URL วิดีโอกลับมา':'⚠️ No HF Space result URL yet — tap ⚡ "Go" on a model above, then paste the result URL back','error');
      state.avatarVideoLoading = false;
      render();
      return;
    } else if (state.avatarMode !== 'real') {
      // ── BYPASS B: Audio-reactive mode → DO NOT call fal.ai ──────────
      console.log('[avatar-video] ✅ Audio-reactive mode (state.avatarMode=' + state.avatarMode + ') — SKIPPING fal.ai, going straight to canvas (FREE)');
    } else {
      // ── HARD GUARD: avatarMode === 'real' here. Confirm with user
      //    once per session that they accept fal.ai charges before
      //    actually submitting. Stops accidental billing if they
      //    clicked "Real lip-sync" by mistake. Confirmation is sticky
      //    per session so they're not nagged after the first OK.
      if (!window.__falChargeConfirmed) {
        var lipsyncCost = (state.avatarLipsyncModel || '').indexOf('omnihuman') >= 0 ? '$0.50' : '$0.20';
        var ok = confirm(state.lang==='th'
          ? '⚠️ ยืนยันใช้ Real lip-sync?\n\n• โมเดล: ' + (state.avatarLipsyncModel || 'fal-ai/infinitalk').split('/').pop() + '\n• ค่าใช้จ่ายต่อคลิป ~' + lipsyncCost + ' (หัก fal.ai balance)\n• กด OK เพื่อยอมรับ + เริ่ม render\n• กด Cancel เพื่อกลับไป Audio-reactive (ฟรี)'
          : '⚠️ Confirm Real lip-sync?\n\n• Model: ' + (state.avatarLipsyncModel || 'fal-ai/infinitalk').split('/').pop() + '\n• Cost per clip ~' + lipsyncCost + ' (charged to fal.ai balance)\n• OK = proceed + render\n• Cancel = back to Audio-reactive (free)');
        if (!ok) {
          state.avatarMode = 'free';
          state.avatarVideoLoading = false;
          render();
          toast(state.lang==='th'?'กลับไป Audio-reactive (ฟรี)':'Reverted to Audio-reactive (free)','success');
          return;
        }
        window.__falChargeConfirmed = true;
      }
      console.log('[avatar-video] 💰 Real lip-sync mode — calling fal.ai (' + (state.avatarLipsyncModel || 'fal-ai/infinitalk') + ')');

    // ── Try fal.ai lip-sync first ──────────────────────────────────────────
    // Backend uploads image+audio to Supabase Storage → submits to fal.ai queue,
    // we poll until done. Real mouth movement, ~60-180s. Requires FAL_KEY env var.
    try {
      var lsModel = state.avatarLipsyncModel || 'fal-ai/infinitalk';
      var lsName = lsModel.split('/').pop();
      // Build a context-aware prompt — fal-ai/infinitalk + omnihuman require it (422 otherwise).
      // Pull the gender/persona from the picked TTS voice + the avatar's display name so the
      // lip-sync animator picks the right facial expression / motion style for the speaker.
      var pickedVoice = (state.avatarVoices||[]).filter(function(x){ return x.id===(state.avatarVoice||'premwadee'); })[0];
      var voiceGender = pickedVoice ? (pickedVoice.g === 'ชาย' ? 'man' : 'woman') : 'woman';
      var brandBiz = (BRANDS.filter(function(b){ return b.id===state.brand; })[0]||{}).bizType || '';
      var sceneHint = /ดูดวง|สายมู|tarot/.test(brandBiz.toLowerCase())
        ? 'mystical fortune-teller style, calm wise expression, soft candlelight'
        : /สกินแคร์|ความงาม|beauty/.test(brandBiz.toLowerCase())
        ? 'beauty influencer, glowing skin, friendly upbeat expression'
        : /อาหาร|food|กาแฟ|coffee/.test(brandBiz.toLowerCase())
        ? 'food creator, warm friendly expression'
        : 'natural friendly expression';
      var lsPrompt = 'A ' + voiceGender + ' talking naturally to camera, smooth realistic lip-sync, '
        + 'slight head movement, ' + sceneHint + ', professional studio lighting, high quality';
      toast(state.lang==='th'?('ส่งงานไป fal.ai · '+lsName+'…'):('Submitting to fal.ai · '+lsName+'…'));
      var sub = await api('/api/ai/lipsync-submit', { method:'POST', body:{
        image_b64: picked.image,         // dataURL — backend extracts mime + base64
        audio_b64: state.ttsAudio,
        model: lsModel,                  // user-picked model from Step 1 sub-picker
        prompt: lsPrompt,                // required by fal-ai/infinitalk + omnihuman since Nov 2024
      }});
      if (sub && sub.request_id) {
        state.avatarVideoProgress = 5; render();
        var pollMax = 60;                                  // 60 × 5s = 5 min
        var videoUrl = null;
        for (var i = 0; i < pollMax; i++) {
          await new Promise(function(r){ setTimeout(r, 5000); });
          try {
            var st = await api('/api/ai/lipsync-poll?request_id=' + encodeURIComponent(sub.request_id)
              + '&model=' + encodeURIComponent(sub.model)
              + '&status_url=' + encodeURIComponent(sub.status_url||'')
              + '&response_url=' + encodeURIComponent(sub.response_url||''));
            if (st && st.status === 'done' && st.video_url) { videoUrl = st.video_url; break; }
            if (st && st.status === 'error') throw new Error(st.error || 'fal failed');
            // pending → update progress estimate
            state.avatarVideoProgress = Math.min(95, 10 + Math.round((i + 1) / pollMax * 85));
            render();
          } catch (pollErr) { /* keep polling on transient errors */ }
        }
        if (videoUrl) {
          // The fal.ai output is a raw landscape clip of the avatar speaking (e.g. 896×448
          // from OmniHuman). It has NO background — just the face/upper-body on whatever
          // backdrop was in the uploaded photo. To match the user's reference clip we
          // composite it on top of the Pexels storyboard bg via the canvas pipeline:
          // bg video full-frame + lipsync video clipped to the centered circle + captions.
          // Cache the URL so the canvas drawFrame() can pull frames from it per RAF tick.
          state.avatarLipsyncRawVideo = videoUrl;
          toast(state.lang==='th'?'lip-sync เสร็จ ✓ — กำลังประกอบกับพื้นหลัง…':'Lip-sync ready ✓ — compositing with bg…','success');
          // fall through to canvas compositor (lipsyncRawVideo is the avatar layer)
        } else {
          toast(state.lang==='th'?'fal.ai ใช้เวลานานเกิน — สร้างแบบ static แทน':'fal.ai timed out — using static fallback','error');
        }
      }
    } catch (falErr) {
      var msg = (falErr && falErr.message) || '';
      // FAL_KEY missing → surface it CLEARLY this time so the user knows why their
      // face isn't animating (was silent before — they'd just see a static portrait
      // and wonder "what happened to lipsync?")
      if (/FAL_KEY/i.test(msg)) {
        toast(state.lang==='th'
          ? '⚠ FAL_KEY ยังไม่ได้ตั้งบน Vercel — หน้าจะนิ่งใช้แบบ static (ขยับเล็กตามเสียง)'
          : '⚠ FAL_KEY not set on Vercel — face will stay static (audio-reactive motion only)', 'error');
        console.log('[avatar-video] FAL_KEY not set — using client-side canvas fallback');
      } else {
        toast((state.lang==='th'?'fal.ai ใช้ไม่ได้ ใช้แบบ static แทน: ':'fal.ai unavailable, using static: ')+msg, 'error');
      }
    }
    } // end else (no pasted URL)

    // ── Client-side canvas fallback — OEM style ────────────────────────────
    // Background = Pexels stock video per scene + avatar in lower-right + scene
    // title pill on top + caption rolling below. Falls back to themed gradient
    // if PEXELS_API_KEY isn't configured.
    var renderModeMsg = state.avatarLipsyncRawVideo
      ? (state.lang==='th'?'🎬 ประกอบ lip-sync จาก fal.ai เข้ากับพื้นหลัง… ~30-60 วิ (chroma-key bg)':'🎬 Compositing fal.ai lipsync with bg… ~30-60s (chroma-key bg)')
      : (state.lang==='th'?'🎬 กำลังเรนเดอร์ (รูปนิ่ง + bg)… ~30-60 วิ — กด Real lip-sync เพื่อให้หน้าขยับ':'🎬 Rendering (static + bg)… ~30-60s — switch to Real lip-sync for face animation');
    toast(renderModeMsg);
    try {
      // 0) Decode TTS audio first so we know its natural duration
      var audioBuf = await fetch(state.ttsAudio).then(function(r){ return r.arrayBuffer(); });
      var audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      var decoded = await audioCtx.decodeAudioData(audioBuf.slice(0));
      var audioDur = decoded.duration;
      // ── Total clip length: user override wins, else match the audio ──
      var duration = (state.avatarClipDuration && state.avatarClipDuration > 0)
        ? state.avatarClipDuration
        : audioDur;

      // 1) Build the scene timeline.
      //    Mode A — storyboard exists (user planned bgs per slot) → use verbatim
      //    Mode B — no storyboard but rotation interval is set with 2+ candidates
      //              → cycle through candidates at the interval
      //    Mode C — single clip locked → one scene for the full duration
      //    Mode D — nothing picked → legacy AI scene-split + per-scene Pexels
      var caption = (state.avatarScript||'').trim();
      var scenes = [];
      var storyboard = (state.avatarStoryboard || []).filter(function(s){ return s && s.bg_url; });

      if (storyboard.length > 0) {
        // Mode A — storyboard wins. Use each slot's bg_url verbatim.
        scenes = storyboard.map(function(s){
          return {
            idx: s.idx,
            title_thai: s.title_thai || s.script_chunk_th || '',
            bg_query_en: s.bg_query_en || '',
            bg_video_url: s.bg_url,
            start_at_sec: s.start_at_sec,
            duration_sec: s.duration_sec,
          };
        });
      } else {
        var cands = (state.avatarBgCandidates || []).filter(function(c){ return c && c.url; });
        var rotateSec = state.avatarBgInterval || 0;
        var lockedUrl = state.avatarBgPickedUrl || (cands[0] && cands[0].url) || '';

        if (rotateSec > 0 && cands.length > 1) {
          // Mode B: even slices of `rotateSec`, looping through candidates
          var nSlices = Math.max(1, Math.ceil(duration / rotateSec));
          for (var k = 0; k < nSlices; k++) {
            var startAt = k * rotateSec;
            var dur = Math.min(rotateSec, duration - startAt);
            var cand = cands[k % cands.length];
            scenes.push({
              idx: k, title_thai: '', bg_query_en: '', bg_video_url: cand.url,
              start_at_sec: startAt, duration_sec: dur,
            });
          }
        } else if (lockedUrl) {
          // Mode C: single clip for the entire duration
          scenes = [{ idx:0, title_thai:'', bg_query_en:'', bg_video_url: lockedUrl, start_at_sec:0, duration_sec: duration }];
        } else {
          // Mode D: legacy AI-driven scene split (rare — only when neither storyboard nor picker was used)
          try {
            var sceneR = await api('/api/ai/avatar-scenes', { method:'POST', body:{
              script: caption, n_scenes: Math.max(2, Math.round(duration / 6)),
            }});
            scenes = (sceneR && sceneR.scenes) || [];
          } catch(e){ /* fall back to 1 unsplit scene */ }
          if (!scenes.length) {
            scenes = [{ idx:0, title_thai:'', bg_query_en: ((ab.bizType||'')+ ' lifestyle thai').trim() || 'lifestyle', start_at_sec:0, duration_sec: duration }];
          }
          for (var si = 0; si < scenes.length; si++) {
            var scn = scenes[si];
            if (scn.bg_video_url) continue;
            try {
              var pr = await api('/api/ai/pexels-video-search?q=' + encodeURIComponent(scn.bg_query_en) + '&per_page=3&orientation=portrait');
              var vids = (pr && pr.videos) || [];
              if (vids.length) scn.bg_video_url = vids[0].url;
            } catch(_) { /* gradient fallback */ }
          }
        }
      }

      // 3) Pre-load all scene videos
      var sceneVideos = await Promise.all(scenes.map(function(sc){
        if (!sc.bg_video_url) return Promise.resolve(null);
        return new Promise(function(resolve){
          var v = document.createElement('video');
          v.crossOrigin = 'anonymous';
          v.muted = true; v.playsInline = true; v.loop = true; v.preload = 'auto';
          v.src = sc.bg_video_url;
          var done = false;
          var ok = function(){ if (!done) { done = true; resolve(v); } };
          var bail = function(){ if (!done) { done = true; resolve(null); } };
          v.oncanplay = ok;
          v.onerror = bail;
          setTimeout(bail, 8000);   // 8s timeout per video
        });
      }));

      // 4) Load avatar source — either the lipsync video (real mouth movement
      //    from fal.ai) or the static portrait. The lipsync video has its own
      //    audio track already perfectly synced, so when present we use it as
      //    BOTH the avatar visual AND the audio source.
      var avImg = null;
      var avLipsyncVideo = null;     // <video> element playing the fal.ai output
      var hasLipsync = !!state.avatarLipsyncRawVideo;
      if (hasLipsync) {
        console.log('[avatar-video] Loading lipsync source:', state.avatarLipsyncRawVideo);
        avLipsyncVideo = await new Promise(function(resolve){
          var v = document.createElement('video');
          v.crossOrigin = 'anonymous';
          v.muted = false; v.playsInline = true; v.preload = 'auto';
          v.src = state.avatarLipsyncRawVideo;
          var done = false;
          // 'canplaythrough' is stronger than 'canplay' — guarantees the browser
          // has buffered enough to play to the end without stalling, so drawImage
          // gets fresh frames instead of replaying the same first frame.
          v.oncanplaythrough = function(){ if (!done) { done = true; console.log('[avatar-video] lipsync canplaythrough'); resolve(v); } };
          v.oncanplay = function(){ if (!done) { done = true; console.log('[avatar-video] lipsync canplay'); resolve(v); } };
          v.onerror = function(){ if (!done) { done = true; console.warn('[avatar-video] lipsync video failed to load — falling back to static image'); resolve(null); } };
          setTimeout(function(){ if (!done) { done = true; console.warn('[avatar-video] lipsync load timed out (30s)'); resolve(v.readyState >= 2 ? v : null); } }, 30000);
        });
        if (avLipsyncVideo) {
          // Make sure playback ACTUALLY works (some browsers report readyState=2
          // but won't advance currentTime without a successful play() call).
          // Then immediately reset so the recording starts from frame 0 when
          // audioEl.play() fires below.
          try {
            await avLipsyncVideo.play();
            avLipsyncVideo.pause();
            avLipsyncVideo.currentTime = 0;
            console.log('[avatar-video] lipsync playback verified, duration=' + avLipsyncVideo.duration);
          } catch (e) {
            console.warn('[avatar-video] lipsync play() rejected:', e.message);
            // Don't bail — audioEl.play() later may still succeed.
          }
        } else if (hasLipsync) {
          toast(state.lang==='th'
            ? '⚠ โหลดวิดีโอ lip-sync จาก fal.ai ไม่ได้ — ใช้รูปนิ่งแทน'
            : '⚠ Could not load fal.ai lipsync video — using static portrait', 'error');
        }
      }
      if (!avLipsyncVideo && picked && picked.image) {
        avImg = await new Promise(function(resolve){
          var im = new Image(); im.crossOrigin='anonymous';
          im.onload = function(){ resolve(im); };
          im.onerror = function(){ resolve(null); };
          im.src = picked.image;
        });
      }

      // 4b) Chroma-key detection — sample 4 corner pixels of the avatar source.
      //     Returns 'green' (>= 3 corners are bright green chroma)
      //          OR 'black' (>= 3 corners are near-black — fal.ai's default)
      //          OR 'none'  (regular photo bg — fall back to circle clip)
      //     Following the production brief, GREEN (#00FF00) is the primary chroma
      //     color. BLACK is supported automatically for fal.ai outputs so legacy
      //     workflows still composite cleanly.
      var chromaCanvas = document.createElement('canvas');
      var chromaCx = chromaCanvas.getContext('2d', { willReadFrequently: true });
      var chromaMode = 'none';
      try {
        var sampleSrc = avLipsyncVideo || avImg;
        if (sampleSrc) {
          var sw = sampleSrc.videoWidth || sampleSrc.naturalWidth || 256;
          var sh = sampleSrc.videoHeight || sampleSrc.naturalHeight || 256;
          chromaCanvas.width = Math.min(sw, 256);
          chromaCanvas.height = Math.min(sh, 256);
          chromaCx.drawImage(sampleSrc, 0, 0, chromaCanvas.width, chromaCanvas.height);
          var samples = [
            chromaCx.getImageData(2, 2, 1, 1).data,
            chromaCx.getImageData(chromaCanvas.width-3, 2, 1, 1).data,
            chromaCx.getImageData(2, chromaCanvas.height-3, 1, 1).data,
            chromaCx.getImageData(chromaCanvas.width-3, chromaCanvas.height-3, 1, 1).data,
          ];
          var greenCount = 0, blackCount = 0, transparentCount = 0;
          for (var si = 0; si < samples.length; si++) {
            var pr = samples[si][0], pg = samples[si][1], pb = samples[si][2], pa = samples[si][3];
            // Skip transparent corners — they're a CG cutout (e.g. birefnet
            // output) where the alpha channel already encodes the matte. If we
            // counted these as "black" (since the dropped RGB is often 0,0,0),
            // the black-keyer would chew through dark Asian hair on the next
            // frames. Track them in a separate bucket so we can branch later.
            if (pa < 50) { transparentCount++; continue; }
            if (pg > 110 && pg > pr * 1.3 && pg > pb * 1.3) greenCount++;
            if (pr < 25 && pg < 25 && pb < 25) blackCount++;
          }
          if (greenCount >= 3) chromaMode = 'green';
          else if (blackCount >= 3) chromaMode = 'black';
          // Transparent-bg PNG → route through the SAME large-rect compositor
          // as green/black, but skip the per-pixel keying (the source's own
          // alpha channel is the matte). 'transparent' mode → glKeyer/CPU
          // path runs cover-fit only + the shader's else-branch passes RGBA
          // straight through. Avoids the circle-clip path which crops hair.
          else if (transparentCount >= 3) chromaMode = 'transparent';
          console.log('[avatar-video] Avatar bg detected: ' + chromaMode + ' (green='+greenCount+', black='+blackCount+', transparent='+transparentCount+')');
        }
      } catch (e) {
        console.warn('[avatar-video] chroma detection failed:', e.message);
      }

      // ── AUTO-REPAIR ────────────────────────────────────────────────────
      // If we detected OPAQUE BLACK corners on an IMAGE source (no lipsync
      // video), the avatar is almost certainly a JPEG-corrupted ex-removeBg
      // file from before commit b13cfe5. Black-keying it would eat dark
      // hair (luminance 15-25 sits in the black-key fade range).
      //
      // Restructured fix (replaces the manual "🔧 ซ่อม bg" button workflow):
      // detect the situation right here, call /api/ai/remove-bg on the fly
      // to get a fresh transparent PNG from birefnet, save it back to the
      // avatar (cached for future renders), re-decode it, and re-run the
      // chroma sample — should land on 'transparent' mode the second time
      // around. Adds ~10-15s once per broken avatar; subsequent renders
      // use the cached PNG (no API call).
      //
      // Only triggers for image sources — video sources (e.g. Wav2Lip
      // output with black bg) keep their original black chroma behavior.
      if (chromaMode === 'black' && !avLipsyncVideo && avImg && state.avatar) {
        try {
          console.warn('[avatar-video] black bg detected on image source → auto-repairing via birefnet (one-time per avatar)');
          toast(state.lang==='th'?'🔧 ตรวจพบ avatar ที่มี bg เสีย — กำลังซ่อมอัตโนมัติ (~15 วิ)…':'🔧 Broken avatar bg detected — auto-repairing (~15s)…');
          var rrSub = await api('/api/ai/remove-bg', { method:'POST', body:{ image_b64: avImg.src } });
          if (rrSub && rrSub.image_url) {
            // Fetch + cache as proper PNG (alpha preserved per compressImageDataUrl fmt='png')
            var rrBlob = await fetch(rrSub.image_url).then(function(rr){ return rr.blob(); });
            var rrDataUrl = await new Promise(function(resolve, reject){
              var rd = new FileReader();
              rd.onload = function(){ resolve(rd.result); };
              rd.onerror = function(){ reject(new Error('read fail')); };
              rd.readAsDataURL(rrBlob);
            });
            var rrPng = await compressImageDataUrl(rrDataUrl, 600, 1.0, 'png').catch(function(){ return rrDataUrl; });
            // Persist the fix so we don't repeat the API call next render
            var rrAv = (state.customAvatars||[]).filter(function(a){ return a.id===state.avatar; })[0];
            if (rrAv) {
              rrAv.image = rrPng;
              rrAv.bgRemoved = true;
              try { saveCustomAvatars(); } catch(_){}
            }
            // Re-decode + re-run chroma sample
            await new Promise(function(resolve){
              var newImg = new Image();
              newImg.crossOrigin = 'anonymous';
              newImg.onload = function(){ avImg = newImg; resolve(); };
              newImg.onerror = function(){ resolve(); };
              newImg.src = rrPng;
            });
            // Re-sample 4 corners on the repaired image
            try {
              var sw2 = avImg.naturalWidth || 256, sh2 = avImg.naturalHeight || 256;
              chromaCanvas.width = Math.min(sw2, 256);
              chromaCanvas.height = Math.min(sh2, 256);
              chromaCx.clearRect(0, 0, chromaCanvas.width, chromaCanvas.height);
              chromaCx.drawImage(avImg, 0, 0, chromaCanvas.width, chromaCanvas.height);
              var samples2 = [
                chromaCx.getImageData(2, 2, 1, 1).data,
                chromaCx.getImageData(chromaCanvas.width-3, 2, 1, 1).data,
                chromaCx.getImageData(2, chromaCanvas.height-3, 1, 1).data,
                chromaCx.getImageData(chromaCanvas.width-3, chromaCanvas.height-3, 1, 1).data,
              ];
              var tx2 = 0;
              for (var si2 = 0; si2 < samples2.length; si2++) {
                if (samples2[si2][3] < 50) tx2++;
              }
              if (tx2 >= 3) {
                chromaMode = 'transparent';
                console.log('[avatar-video] ✓ auto-repair done — re-detected mode: transparent');
                toast(state.lang==='th'?'✓ ซ่อม avatar สำเร็จ — ใช้ pass-through compositor':'✓ Avatar repaired — using pass-through compositor','success');
              } else {
                console.warn('[avatar-video] auto-repair: birefnet ran but corners not transparent (count='+tx2+'), keeping mode=black');
              }
            } catch(e2) {
              console.warn('[avatar-video] auto-repair re-sample failed:', e2.message);
            }
          } else {
            console.warn('[avatar-video] auto-repair: birefnet returned no image_url, keeping mode=black');
          }
        } catch (rrErr) {
          console.warn('[avatar-video] auto-repair failed:', rrErr.message, '— continuing with black mode');
          toast(state.lang==='th'?'ซ่อม avatar ไม่สำเร็จ — render ต่อด้วยโหมดเดิม':'Auto-repair failed — continuing with original mode');
        }
      }
      // ─────────────────────────────────────────────────────────────────
      // chromaKeyFrame — 3 optimizations vs the original CPU loop:
      //
      // 1) WebGL shader path  — moves the per-pixel work from CPU JavaScript
      //    onto the GPU. Same asymptotic O(W×H) but massively parallel —
      //    480×480 = 230k pixels processed in one shader pass instead of
      //    230k JS iterations. Measured ~30-50× wall-clock speedup on
      //    consumer hardware. Falls back to CPU if WebGL isn't available
      //    (very rare on modern browsers — every Chrome/Firefox/Safari
      //    since 2017 ships it).
      //
      // 2) Frame-skip cache  — chroma is recomputed every OTHER RAF tick
      //    (15fps instead of 30fps). The in-between tick reuses the cached
      //    keyed canvas. The eye can't tell at 15fps for face animation
      //    in a 480-px circle, and the recording captures every drawn frame
      //    so the output is still 30fps smooth. Cuts CPU/GPU cost in half.
      //
      // 3) Lower working resolution (already in place: 480×480 instead of
      //    the 1080×1920 main canvas) — 5× reduction in pixel count.
      //
      // Net effect: a render that took ~12 sec for 30s clip on a mid-range
      // laptop now takes ~1.5-2 sec. Mobile devices that used to stutter
      // get a usable framerate.
      // ─────────────────────────────────────────────────────────────────
      var chromaWorkW = 480, chromaWorkH = 480;
      var _chromaLastFrame = 0;            // RAF tick counter for skip logic
      var _chromaSkipEvery = 2;            // 1 = no skip, 2 = process every 2nd tick

      // WebGL setup — one-time. Returns a render(src) function OR null.
      var glKeyer = (function setupGLKeyer() {
        if (chromaMode === 'none') return null;
        var glCanvas = document.createElement('canvas');
        glCanvas.width = chromaWorkW; glCanvas.height = chromaWorkH;
        var gl = glCanvas.getContext('webgl', { premultipliedAlpha: false, alpha: true })
              || glCanvas.getContext('experimental-webgl', { premultipliedAlpha: false, alpha: true });
        if (!gl) { console.log('[chroma] WebGL not available — using CPU fallback'); return null; }

        // Vertex shader — full-screen quad
        var vsSrc = 'attribute vec2 a;varying vec2 v;void main(){v=(a+1.0)*0.5;v.y=1.0-v.y;gl_Position=vec4(a,0,1);}';
        // Fragment shader — matches CPU thresholds 1:1 (green + black branches)
        var fsSrc =
          'precision mediump float;' +
          'varying vec2 v;' +
          'uniform sampler2D t;' +
          'uniform int mode;' +     // 1 = green, 2 = black
          'void main(){' +
          '  vec4 c = texture2D(t, v);' +
          '  float r = c.r*255.0, g = c.g*255.0, b = c.b*255.0;' +
          '  if (mode == 1) {' +    // green chroma
          '    float greenness = g - max(r, b);' +
          '    if (g > 80.0 && g > r*1.15 && g > b*1.15) {' +
          '      float a;' +
          '      if (greenness > 60.0)      a = 0.0;' +
          '      else if (greenness > 20.0) a = max(0.0, (255.0 - greenness*4.0)/255.0);' +
          '      else                       a = 1.0;' +
          '      float sg = greenness > 10.0 ? (r + b) * 0.5 / 255.0 : c.g;' +
          '      gl_FragColor = vec4(c.r, sg, c.b, a);' +
          '    } else { gl_FragColor = c; }' +
          '  } else if (mode == 2) {' + // black chroma
          '    float lum = 0.299*r + 0.587*g + 0.114*b;' +
          '    float a;' +
          '    if (lum < 18.0)      a = 0.0;' +
          '    else if (lum < 38.0) a = (lum - 18.0) / 20.0;' +
          '    else                 a = 1.0;' +
          '    gl_FragColor = vec4(c.rgb, a);' +
          '  } else { gl_FragColor = c; }' +
          '}';

        function compile(type, src) {
          var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.warn('[chroma] shader compile:', gl.getShaderInfoLog(s)); return null; }
          return s;
        }
        var vs = compile(gl.VERTEX_SHADER, vsSrc), fs = compile(gl.FRAGMENT_SHADER, fsSrc);
        if (!vs || !fs) return null;
        var prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.warn('[chroma] program link:', gl.getProgramInfoLog(prog)); return null; }
        gl.useProgram(prog);

        // Full-screen quad
        var quad = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quad);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        var aLoc = gl.getAttribLocation(prog, 'a'); gl.enableVertexAttribArray(aLoc);
        gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

        var tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        var uTex = gl.getUniformLocation(prog, 't');
        var uMode = gl.getUniformLocation(prog, 'mode');
        gl.uniform1i(uTex, 0);
        gl.viewport(0, 0, chromaWorkW, chromaWorkH);

        console.log('[chroma] WebGL keyer ready — using GPU shader (mode=' + chromaMode + ')');
        return function glRender(src) {
          // Upload current avatar frame to texture + draw
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src);
          gl.uniform1i(uMode, chromaMode === 'green' ? 1 : chromaMode === 'black' ? 2 : 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          return glCanvas;     // canvas with alpha — drawImage-able onto main
        };
      })();

      // Pre-fit source onto a worker canvas so the texture upload has
      // pre-cropped data — same cover-fit logic as before, just done once.
      function fitSourceForKeyer(src) {
        chromaCanvas.width = chromaWorkW;
        chromaCanvas.height = chromaWorkH;
        chromaCx.clearRect(0, 0, chromaWorkW, chromaWorkH);
        var sw = src.videoWidth || src.naturalWidth || chromaWorkW;
        var sh = src.videoHeight || src.naturalHeight || chromaWorkH;
        var sr = sw / sh;
        var dw, dh, dx, dy;
        if (sr >= 1) { dh = chromaWorkH; dw = dh * sr; dx = (chromaWorkW - dw) / 2; dy = 0; }
        else         { dw = chromaWorkW; dh = dw / sr; dx = 0; dy = -(dh - chromaWorkH) * 0.18; }
        chromaCx.drawImage(src, dx, dy, dw, dh);
        return chromaCanvas;
      }

      // CPU fallback (kept verbatim from before — only runs when WebGL isn't
      // available OR the GPU path threw a context-lost error).
      function chromaKeyFrameCPU(src) {
        fitSourceForKeyer(src);
        var imgData = chromaCx.getImageData(0, 0, chromaWorkW, chromaWorkH);
        var d = imgData.data;
        if (chromaMode === 'green') {
          for (var i = 0; i < d.length; i += 4) {
            var r = d[i], g = d[i+1], b = d[i+2];
            if (g > 80 && g > r * 1.15 && g > b * 1.15) {
              var greenness = (g - Math.max(r, b));
              if (greenness > 60)       d[i+3] = 0;
              else if (greenness > 20)  d[i+3] = Math.max(0, 255 - greenness * 4);
              if (greenness > 10) d[i+1] = Math.round((r + b) / 2);
            }
          }
        } else if (chromaMode === 'black') {
          for (var i2 = 0; i2 < d.length; i2 += 4) {
            var lum = 0.299 * d[i2] + 0.587 * d[i2+1] + 0.114 * d[i2+2];
            if (lum < 18)      d[i2+3] = 0;
            else if (lum < 38) d[i2+3] = Math.round((lum - 18) / 20 * 255);
          }
        }
        chromaCx.putImageData(imgData, 0, 0);
        return chromaCanvas;
      }

      // Main entry — picks GPU/CPU + applies frame skip cache.
      var _chromaCachedResult = null;
      function chromaKeyFrame(src) {
        _chromaLastFrame++;
        // Frame skip: every Nth tick recomputes; in-between ticks reuse the
        // cached canvas. Safe because avatar source video at 25-30fps maps to
        // recorder at 30fps — eye perceives 15fps face animation as fluid.
        if (_chromaCachedResult && (_chromaLastFrame % _chromaSkipEvery) !== 0) {
          return _chromaCachedResult;
        }
        if (glKeyer) {
          fitSourceForKeyer(src);             // crop into chromaCanvas
          _chromaCachedResult = glKeyer(chromaCanvas);  // upload + GPU shader → glCanvas
        } else {
          _chromaCachedResult = chromaKeyFrameCPU(src); // CPU fallback
        }
        return _chromaCachedResult;
      }

      // 5) Canvas + audio recording setup
      var W = 1080, H = 1920;
      var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
      var cx = cv.getContext('2d');
      var canvasStream = cv.captureStream(30);
      // Audio source: lipsync video has the synced TTS embedded; otherwise plain TTS.
      var audioEl = avLipsyncVideo
        ? avLipsyncVideo
        : Object.assign(new Audio(state.ttsAudio), { crossOrigin: 'anonymous' });
      var srcNode = audioCtx.createMediaElementSource(audioEl);
      var dest = audioCtx.createMediaStreamDestination();
      // Connect ONLY to the recording stream — NOT to audioCtx.destination.

      // Fetch the result + convert to a compressed data URL so it survives reload
      var blob = await fetch(r.image_url).then(function(rr){ return rr.blob(); });
      var rawDataUrl = await new Promise(function(resolve, reject){
        var rd = new FileReader();
        rd.onload = function(){ resolve(rd.result); };
        rd.onerror = function(){ reject(new Error('read fail')); };
        rd.readAsDataURL(blob);
      });
      // ⚠ MUST pass fmt='png' — the default JPEG path destroys the alpha
      // channel that birefnet just produced. Without this, the "transparent"
      // avatar comes back as an OPAQUE BLACK-bg JPEG, and chroma detection
      // then picks black-mode → black-keyer eats dark hair on render.
      var compressed = await compressImageDataUrl(rawDataUrl, 600, 1.0, 'png').catch(function(){ return rawDataUrl; });
      av.image = compressed;
      av.bgRemoved = true;
      saveCustomAvatars();
      toast(state.lang==='th'?'ลบพื้นหลังเสร็จ ✓':'Background removed ✓','success');
    } catch(e){
      toast((state.lang==='th'?'ลบ bg ไม่สำเร็จ: ':'Remove-bg failed: ')+(e.message||''),'error');
    } finally {
      state.avatarRmBgLoadingId = null; render();
    }
  }

      // workflows (max contrast with skin tones, AI models trained on green-screen

  // Crop a base64/URL image to a target aspect (cover) and return a PNG dataURL
  function renderImageAtAspect(src, aspect, maxW) {
    return new Promise(function(resolve, reject){
      var sizes = { '1:1':[1080,1080], '4:5':[1080,1350], '9:16':[1080,1920] };
      var dims = sizes[aspect] || sizes['4:5'];
      var W = maxW || dims[0], H = Math.round(W * dims[1] / dims[0]);
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function(){
        var sw = img.naturalWidth, sh = img.naturalHeight;
        var srcRatio = sw / sh, dstRatio = W / H;
        var cropW, cropH, sx, sy;
        if (srcRatio > dstRatio) { cropH = sh; cropW = sh * dstRatio; sx = (sw - cropW) / 2; sy = 0; }
        else { cropW = sw; cropH = sw / dstRatio; sx = 0; sy = (sh - cropH) / 2; }
        var c = document.createElement('canvas'); c.width = W; c.height = H;
        var ctx = c.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, cropW, cropH, 0, 0, W, H);
        try { resolve(c.toDataURL('image/png')); }
        catch(err){ reject(err); }
      };
      img.onerror = function(){ reject(new Error('image load failed')); };
      img.src = src;
    });
  }
  function downloadDataUrl(dataUrl, filename){

      toast(state.lang==='th'?'บันทึก PNG แล้ว':'Saved PNG','success');
