  // Compress a base64 image to ~thumbnail size so it fits in localStorage
  // IndexedDB store for full-size draft images (localStorage is too small for many full-quality images)
  var _ppIdbPromise = null;
  function _ppIdb(){
    if (_ppIdbPromise) return _ppIdbPromise;
    _ppIdbPromise = new Promise(function(resolve, reject){
      var req = indexedDB.open('postpost-images', 1);
      req.onupgradeneeded = function(){ req.result.createObjectStore('images'); };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
    return _ppIdbPromise;
  }
  async function idbPutImage(key, val){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').put(val, key);
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
    });
  }
  async function idbGetImage(key){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readonly');
      var req = tx.objectStore('images').get(key);
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error); };
    });
  }
  async function idbDeleteImage(key){
    var db = await _ppIdb();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').delete(key);
      tx.oncomplete = function(){ resolve(); };
      tx.onerror = function(){ reject(tx.error); };
    });
  }

  // compressImageDataUrl(src, maxDim, quality, fmt?)
  //   fmt: 'jpeg' (default — smaller, no alpha) | 'png' (lossless, KEEPS alpha)
  //
  // ⚠ JPEG silently destroys the alpha channel — transparent pixels become
  // OPAQUE BLACK. This used to break avatar chroma-key in a subtle way:
  // removeAvatarBg returned a transparent PNG → this function JPEG'd it →
  // saved avatar had alpha=255 + RGB=(0,0,0) at corners → chroma detector
  // picked 'black' mode → black-keyer ate dark Asian hair. Always pass
  // fmt='png' for any image that needs to keep transparency.
  function compressImageDataUrl(dataUrl, maxDim, quality, fmt){
    maxDim = maxDim || 360; quality = quality || 0.7;
    fmt = (fmt === 'png') ? 'png' : 'jpeg';
    return new Promise(function(resolve){
      if (!dataUrl || dataUrl.indexOf('data:') !== 0) return resolve(dataUrl);
      var img = new Image();
      img.onload = function(){
        var w = img.width || maxDim, h = img.height || maxDim;
        var s = Math.min(1, maxDim / Math.max(w, h));
        w = Math.max(1, Math.round(w * s)); h = Math.max(1, Math.round(h * s));
        try {
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          // For PNG output keep the canvas transparent before drawing so the
          // source alpha channel is preserved through drawImage + toDataURL.
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          // PNG ignores the quality arg, but pass it harmlessly for symmetry
          resolve(c.toDataURL('image/' + fmt, quality));
        } catch(e){ resolve(dataUrl); }
      };
      img.onerror = function(){ resolve(dataUrl); };
      img.src = dataUrl;
    });
  }

  // Pull the first frame of a video (URL or data URL) as a JPEG poster. Best-effort —
  // returns '' if the video can't be loaded (CORS, codec, …) so the caller falls back
  // to the reference image or no thumbnail at all.
  function videoPosterDataUrl(src, maxDim){
    maxDim = maxDim || 360;
    return new Promise(function(resolve){
      try {
        var v = document.createElement('video');
        v.crossOrigin = 'anonymous';
        v.muted = true; v.playsInline = true; v.preload = 'auto';
        v.src = src;
        var done = false;
        var bail = function(){ if (!done) { done = true; resolve(''); } };
        var grab = function(){
          if (done) return;
          try {
            var w = v.videoWidth || maxDim, h = v.videoHeight || maxDim;
            var s = Math.min(1, maxDim / Math.max(w, h));
            w = Math.max(1, Math.round(w * s)); h = Math.max(1, Math.round(h * s));
            var c = document.createElement('canvas'); c.width = w; c.height = h;
            c.getContext('2d').drawImage(v, 0, 0, w, h);
            done = true; resolve(c.toDataURL('image/jpeg', 0.7));
          } catch(e){ bail(); }
        };
        v.onloadeddata = function(){ try { v.currentTime = Math.min(0.1, (v.duration||0.1)/2); } catch(_){ grab(); } };
        v.onseeked = grab;
        v.onerror = bail;
        setTimeout(bail, 6000);  // hard timeout
      } catch(e) { resolve(''); }
    });
  }

  try { window.PP = window.PP || {}; window.PP.schedCloudPush = schedCloudPush; } catch(_){}
  async function cloudPushNow(){

    console.log('[cloud-sync] pushing → voice/archetype snapshot:', voiceSnapshot);
    var serialized = JSON.stringify(body);
    if (serialized === _cloudPushLastBody) {
      console.log('[cloud-sync] body unchanged since last push — SKIPPING');
      return;
    }
    if (serialized.length > 5 * 1024 * 1024) {
      console.warn('[cloud-sync] payload too big ('+Math.round(serialized.length/1024)+'KB) — skipping');
      setCloudSyncStatus('error', 'ใหญ่เกิน 5MB');

      var resp = await api('/api/workspace', { method:'PUT', body:{ state: body } });

    } catch (e) {
      console.warn('[cloud-sync] ✗ push FAILED:', e.message);

  async function cloudPullOnBoot(){
    if (typeof api !== 'function') { console.warn('[cloud-pull] ✗ api() not available'); return; }
    if (!getTok || !getTok()) { console.warn('[cloud-pull] ✗ NOT LOGGED IN — pull skipped'); return; }
    try {
      var r = await api('/api/workspace');
      var ws = r && r.workspace;
      if (!ws || !ws.state) { console.log('[cloud-pull] no cloud state yet (new user)'); return; }
      var s = ws.state;
      var dirty = false;
      // DIAGNOSTIC: log voice/archetype from CLOUD for each brand
      if (Array.isArray(s.brands)) {
        var cloudSnapshot = s.brands.map(function(b){ return b.id + ':v=' + JSON.stringify(b.voice||[]) + ',a=' + (b.archetype||''); }).join(' | ');
        console.log('[cloud-pull] CLOUD state voice/archetype snapshot:', cloudSnapshot);
      }
      var localSnapshot = BRANDS.map(function(b){ return b.id + ':v=' + JSON.stringify(b.voice||[]) + ',a=' + (b.archetype||''); }).join(' | ');
      console.log('[cloud-pull] LOCAL  state voice/archetype snapshot:', localSnapshot);
      // Merge brands by id — preserve local-only brands (cloud may not have them yet)
      // and keep cloud version when both exist (cloud is the canonical source).
      // EXCEPTION: if the user has already touched a field this session
      // (window.__ppDirtyFields), preserve the local value for that field
      // — otherwise a slow cloudPull can revert clicks the user just made.
      if (Array.isArray(s.brands) && s.brands.length) {
        var byId = {};
        BRANDS.forEach(function(b){ byId[b.id] = b; });
        var dirtyFields = (window.__ppDirtyFields) || {};
        s.brands.forEach(function(b){
          var n = normalizeBrand(b);
          var local = byId[n.id];
          var df = dirtyFields[n.id] || {};
          if (local) {
            if (df.voice) n.voice = Array.isArray(local.voice) ? local.voice.slice() : [];
            if (df.archetype) n.archetype = local.archetype || '';
          }
          byId[n.id] = n;
        });
        BRANDS.length = 0;
        Object.values(byId).forEach(function(b){ BRANDS.push(b); });
        try { localStorage.setItem('postpost_brands', JSON.stringify(BRANDS)); } catch(_){}
        dirty = true;
        var afterSnapshot = BRANDS.map(function(b){ return b.id + ':v=' + JSON.stringify(b.voice||[]) + ',a=' + (b.archetype||''); }).join(' | ');
        console.log('[cloud-pull] MERGED voice/archetype snapshot:', afterSnapshot);
      }
      // Merge drafts
      if (Array.isArray(s.drafts) && s.drafts.length) {
        state.drafts = s.drafts;
        try { localStorage.setItem('postpost_drafts', JSON.stringify(state.drafts)); } catch(_){}
        dirty = true;
      }
      // Merge customAvatars
      if (Array.isArray(s.customAvatars) && s.customAvatars.length) {
        state.customAvatars = s.customAvatars;
        try { localStorage.setItem('postpost_custom_avatars', JSON.stringify(state.customAvatars)); } catch(_){}
        dirty = true;
      }
      // Active brand
      if (s.activeBrandId && BRANDS.some(function(b){ return b.id===s.activeBrandId; })) {
        state.brand = s.activeBrandId;
      }
      // ──────────────────────────────────────────────────────────────
      // CRITICAL: re-derive state.voice / state.archetype / state.brandDesc
      // from the cloud-merged active brand. Without this, state stays at
      // the pre-pull boot snapshot (often the defaults) while BRANDS now
      // has the cloud values. Any later save (saveBrandProfile, voice/
      // archetype click handler that happens to fire when state is still
      // stale, etc.) writes state → brand, pushing DEFAULTS to cloud and
      // wiping the user's real values. Symptom: voice/archetype "doesn't
      // save" after refresh because each refresh re-corrupts the cloud.
      // ──────────────────────────────────────────────────────────────
      var _cpActive = BRANDS.filter(function(b){ return b.id === state.brand; })[0];
      if (_cpActive) {
        var _cpDirty = (window.__ppDirtyFields && window.__ppDirtyFields[_cpActive.id]) || {};
        // Only re-sync fields the user HASN'T touched this session — otherwise
        // we'd revert their in-progress clicks (same race the merge guard above
        // protects against, applied here to the state mirror).
        if (!_cpDirty.voice) {
          state.voice = Array.isArray(_cpActive.voice) ? _cpActive.voice.slice() : [];
        }
        if (!_cpDirty.archetype) {
          state.archetype = _cpActive.archetype || '';
        }
        state.brandDesc = _cpActive.desc || '';
        console.log('[cloud-pull] state synced from active brand:', state.brand,
                    '· voice=', JSON.stringify(state.voice), '· archetype=', state.archetype,
                    '· dirty=', JSON.stringify(_cpDirty));
      }
      // ──────────────────────────────────────────────────────────────
      // Skincare migration — RE-RUN after cloud pull. The boot-time
      // migration cleans local BRANDS, but then cloudPull replaces
      // BRANDS with the cloud version which may still have stale
      // skincare topics/products. Re-run here to clean the merged
      // BRANDS, then push the cleaned version back to cloud so it
      // doesn't haunt future logins.
      // ──────────────────────────────────────────────────────────────
      // Scan ALL topics/products (previously only [0]) — stale skincare was
      // mixing with newer brand-appropriate entries, slipping past the check.
      var SKIN_KW = /Marine Collagen|สกินแคร์|skincare|ผิวบอบบาง|Sheet Mask|Rose Repair|Bio Astin|Bovine Collagen|Toner Pad|คอลลาเจน|เซรั่ม|Beauty Trio|กุหลาบเขาใหญ่|iCON Face|BellaCare|Amado|JOJU|Linhzhimin|Kumiko|Mahad/i;
      var PROD_KW = /Marine Collagen|iCON|BellaCare|Amado|CmaX|JOJU|Linhzhimin|Kumiko|Mahad|Sesame|Chatier/i;
      var cleaned = false;
      BRANDS.forEach(function(b){
        if (b.id === 'happyprice') return;
        if (Array.isArray(b.topics) && b.topics.length) {
          var hasSkin = b.topics.some(function(t){
            return SKIN_KW.test((t && (t.th || t.en)) || '');
          });
          if (hasSkin) {
            console.log('[cloud-sync] post-pull cleanup — wiping skincare topics from:', b.id);
            b.topics = [];
            cleaned = true;
          }
        }
        if (Array.isArray(b.products) && b.products.length) {
          var hasProd = b.products.some(function(p){
            return PROD_KW.test((p && (p.name_th || p.name_en || p.name)) || '');
          });
          if (hasProd) {
            console.log('[cloud-sync] post-pull cleanup — wiping skincare products from:', b.id);
            b.products = [];
            cleaned = true;
          }
        }
      });
      if (cleaned) {
        try { localStorage.setItem('postpost_brands', JSON.stringify(BRANDS)); } catch(_){}
        // Force push the cleaned BRANDS back to cloud immediately so future
        // pulls don't reintroduce the skincare data.
        if (typeof schedCloudPush === 'function') schedCloudPush();
        dirty = true;
      }
      _cloudPushLastBody = JSON.stringify({
        brands: BRANDS, drafts: state.drafts||[], customAvatars: state.customAvatars||[],
        activeBrandId: state.brand, updated_at: s.updated_at,
      });
      if (dirty && typeof render === 'function') render();
      console.log('[cloud-sync] pulled', { brands: (s.brands||[]).length, drafts: (s.drafts||[]).length, avatars: (s.customAvatars||[]).length, cleaned: cleaned });
    } catch (e) {
      console.warn('[cloud-sync] pull failed (offline or new tenant):', e.message);
    }
  }

  // Shopee scraper — Re-sync button runs the real scrape
  // Ping localhost:3000 to see if the user has PostPost running on their machine.
  // Only run once per session — Vercel page load → silently check → flips state.localAgentAlive
  // so the Profile page can show the "Use my machine" toggle.
  async function checkLocalAgent(){
    if (state.localAgentAlive !== null) return state.localAgentAlive;
    try {
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 1500);
      var r = await fetch('http://localhost:3000/api/health', { signal: ctrl.signal });
      clearTimeout(timer);
      state.localAgentAlive = r.ok;
    } catch (e) {
      state.localAgentAlive = false;
    }
    return state.localAgentAlive;
  }
  // Auto-check on boot if we're on a non-localhost host (i.e. user visiting Vercel)
  if (location.hostname && !/^(localhost|127\.|0\.0\.0\.0)/.test(location.hostname)) {
    checkLocalAgent().then(function(){ render(); });
  } else {
    // We ARE on localhost — local agent is "us", no need to ping
    state.localAgentAlive = true;
  }

  // Same as api() but lets us hit a different host (used for the "Use my machine" path)
  async function apiAt(baseUrl, path, opts){
    opts = opts || {};
    var h = {};
    if (opts.body !== undefined) h['Content-Type'] = 'application/json';
    var tk = (typeof getTok==='function') ? getTok() : (localStorage.getItem('postpost_token')||'');
    if (tk) h['Authorization'] = 'Bearer ' + tk;
    var res = await fetch(baseUrl + path, {
      method: opts.method || 'GET', headers: h,
      body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined,
    });
    var data = null;
    try { data = await res.json(); } catch(e){}
    if (!res.ok) throw new Error((data && (data.message || data.error)) || (res.status + ' ' + res.statusText));
    return data;
  }

  async function shopeeSync(){

    // Note: same JWT_SECRET in local .env + Vercel env → same token works on both.
    var useLocal = state.useLocalScraper && state.localAgentAlive === true;
    var apiCall = useLocal
      ? function(path, opts){ return apiAt('http://localhost:3000', path, opts); }
      : api;

      ? (state.lang==='th'?'🖥 กำลังดึงผ่านเครื่องของคุณ… ~14 วินาที':'🖥 Scraping via your machine… ~14s')
      : (state.lang==='th'?'☁ กำลังดึงผ่าน cloud… 1-3 นาที':'☁ Scraping via cloud… 1-3 min'));
    try {
      // Async pattern: submit returns 202 + job_id, then poll until done.
      // This avoids Vercel's 60s function timeout for slow cold-started workers.
      var sub = await apiCall('/api/shopee/scrape', { method:'POST', body:{ url: url, force_local: useLocal } });
      var j = sub;
      // If backend used async path (cloud mode), poll for completion
      if (sub && sub.job_id && sub.status === 'pending') {
        var pollMax = 90;                              // 90 × 4s = 6 min hard cap
        for (var k = 0; k < pollMax; k++) {
          await new Promise(function(r){ setTimeout(r, 4000); });
          try {
            var st = await apiCall('/api/shopee/scrape-status?job_id=' + encodeURIComponent(sub.job_id));
            if (st && st.status === 'done') { j = st.result || {}; break; }
            if (st && st.status === 'error') {
              j = st.result || { error: 'cloud', message: 'scrape failed on worker' };
              break;
            }
            // status='pending' or 'not_found' → keep polling (Render might be cold-starting)
          } catch (pollErr) {
            // transient network — keep polling
          }
        }
        if (!j || (!j.products && !j.ok)) throw new Error('หมดเวลารอ Render worker (~6 นาที) — ลองใหม่อีกครั้ง');
      }

      });

      var inStock = prods.filter(function(p){ return (p.stock||0) > 0; }).length;
      var priced = prods.filter(function(p){ return p.price > 0; });
      var avg = priced.length ? Math.round(priced.reduce(function(s,p){ return s+p.price; },0)/priced.length) : 0;
      var rated = prods.filter(function(p){ return p.rating > 0; });
      var avgR = rated.length ? (rated.reduce(function(s,p){ return s+p.rating; },0)/rated.length).toFixed(1) : '';
      state.shopStats = { count: j.count || prods.length, inStock: inStock, avgPrice: avg.toLocaleString(), rating: avgR };
      // persist the scraped catalog onto the active brand so it survives reloads

      if (_ab) {
        // ── Capture whatever's currently typed in the brand-edit form above ──
        // The input/change handlers should keep _ab in sync, but if the user
        // pasted/typed without blurring (or the handler missed it), pull the
        // live DOM value so saveBrands() persists everything visible.
        var _nameEl = document.getElementById('ppBrandNameEdit');
        var _bizEl  = document.getElementById('ppBizType');
        var _descEl = document.getElementById('ppBrandDesc');
        if (_nameEl && _nameEl.value.trim()) _ab.name = _nameEl.value.trim();
        if (_bizEl  && _bizEl.value)         _ab.bizType = _bizEl.value;
        if (_descEl && _descEl.value.trim()) { _ab.desc = _descEl.value.trim(); state.brandDesc = _ab.desc; }
        // Refresh the subtitle from bizType so the brand tile shows the right label after save
        var _bt = BUSINESS_TYPES.filter(function(x){ return x.th===_ab.bizType || x.en===_ab.bizType; })[0];
        if (_bt) { _ab.sub_th = _bt.th; _ab.sub_en = _bt.en; }
        _ab.products = PRODUCTS;
        _ab.shopStats = state.shopStats;
        _ab.shopUrl = url;
        saveBrands();
      }
      toast((state.lang==='th'?'ดึงข้อมูลสำเร็จ — ':'Synced — ') + (j.count||prods.length) + (state.lang==='th'?' สินค้า':' products'),'success');
    } catch(e){
      toast((state.lang==='th'?'ดึงข้อมูลไม่สำเร็จ: ':'Sync failed: ') + (e.message||''),'error');
    } finally {
      state.shopScraping = false;
      render();
    }
  }
  document.addEventListener('click', function(e){
    if (e.target.closest('[data-shopeesync]')) shopeeSync();
    if (e.target.closest('[data-locallocaltoggle]')) {
      e.preventDefault();
      if (state.localAgentAlive !== true) {
        toast(state.lang==='th'?'localhost:3000 ปิดอยู่ — เปิด `npm run dev` ที่เครื่องคุณก่อน':'localhost:3000 is down — run `npm run dev`','error');
        return;
      }
      state.useLocalScraper = !state.useLocalScraper;
      render();
      toast(state.useLocalScraper
        ? (state.lang==='th'?'🖥 จะใช้เครื่องคุณ scrape ครั้งหน้า':'🖥 Will scrape via your machine next time')
        : (state.lang==='th'?'☁ กลับไปใช้ cloud':'☁ Switched back to cloud'),'success');
    }
  });

  // AI brand-description writer — based on brand name + business type
  async function aiWriteDesc(){
    // Always re-read from the brand object first so the live dropdown selection wins
    // even if the user just switched it but didn't trigger a re-render.
    var ab = BRANDS.find(function(b){ return b.id === state.brand; }) || BRANDS[0];
    var bizSel = document.getElementById('ppBizType');
    var bizType = (bizSel && bizSel.value) || (ab && ab.bizType) || '';
    if (ab && bizType && ab.bizType !== bizType) ab.bizType = bizType;   // sync any pending change
    state.aiAssistOpen = true;
    state.aiDescLoading = true;
    state.aiDescs = [];
    render();
    try {
      var d = await api('/api/ai/brand-description', { method:'POST',
        // NOTE: intentionally NOT passing `current` — the leftover text from a previous
        // business type (e.g. skincare copy when user switches to "ดูดวง") would bias AI.
        // User clicks "AI write" specifically because they want a FRESH description.
        body: { businessType: bizType, brandName: ab ? ab.name : '' } });
      state.aiDescs = (d.descriptions || []).filter(function(x){ return typeof x === 'string' && x.trim(); });
      if (!state.aiDescs.length) toast(state.lang==='th'?'AI ไม่ได้คืนคำอธิบาย ลองใหม่':'No descriptions returned','error');
    } catch(e){
      toast((state.lang==='th'?'เขียนไม่สำเร็จ: ':'Failed: ') + e.message, 'error');
    } finally {
      state.aiDescLoading = false;
      render();
    }
  }
  document.addEventListener('click', function(e){
    if (e.target.closest('[data-aiwrite]')) { aiWriteDesc(); return; }
    var useBtn = e.target.closest('[data-usedesc],[data-usedesc-s]');
    if (useBtn) {
      var ta = document.getElementById('ppBrandDesc');
      var text;
      if (useBtn.dataset.usedesc !== undefined) text = state.aiDescs[+useBtn.dataset.usedesc];
      else { var bd = useBtn.querySelector('div'); text = useBtn.textContent.replace(bd ? bd.textContent : '', '').trim(); }
      if (text) {
        state.brandDesc = text;
        state.aiAssistOpen = false;
        render();
        toast(state.lang==='th'?'ใส่คำอธิบายแล้ว':'Description applied','success');
      }
    }
  });

  // no dead clicks — any button without a wired action gives feedback
  var HANDLED = '[data-go],[data-lang],[data-set],[data-set-step],[data-toggle],'
    + '[data-voice],[data-brand],[data-product],[data-archetype],[data-archeguide],[data-archeclose],'
    + '[data-addbrand],[data-delbrand],[data-aiwrite],[data-usedesc],[data-usedesc-s],[data-changelogo],[data-shopeesync],'
    + '[data-shopguide],[data-shopguideclose],[data-prodview],[data-pdclose],[data-savebrand],'
    + '[data-chconnect],[data-chdisconnect],[data-chsave],[data-chclose],'
    + '[data-filter],[data-filterclose],[data-sortby],[data-instocktoggle],'
    + '[data-gentopics],[data-topicgoal],'
    + '[data-saveproduct],[data-newimgclear],[data-newimg],[data-proddelete],[data-usetopic],[data-genall],[data-savedraft],[data-savevideodraft],[data-saveavatardraft],[data-editdraft],[data-deletedraft],[data-schedule],[data-avatarscript],[data-veogen],[data-newavatar],[data-rmbgavatar],'
    + '[data-uploadavatar],[data-uploadref],[data-clearref],[data-pickrefproduct],[data-refclose],[data-refpick],[data-genvideoprompt],[data-delavatar],[data-addtoday],[data-pickdraft],[data-pickdraftclose],[data-pickdraftgo],[data-tts],[data-pickfbpage],[data-avatarvideo],[data-pastevideourl],[data-pastelipsyncurl],[data-clearlipsyncurl],[data-hflipsync],[data-locallocaltoggle],[data-bgscene],[data-bgpick],[data-bgsearch],[data-bgsearchclear],[data-bginterval],[data-clipdur],[data-avatarabort],[data-genstoryboard],[data-slottoggle],[data-slotsearch],[data-slotpickurl],[data-mobilemenu],[data-mobilebackdrop],[data-profilemenu],[data-profileview],[data-profileclose],[data-signout],'
    + '[data-previewaspect],[data-previewidx],[data-downloadpng],'
    + '[data-analytics-days],[data-automation-refresh]';
  document.addEventListener('click', function(e){
    var b = e.target.closest('button, a');
    if (!b) return;
    if (b.closest(HANDLED)) return;            // handled by the prototype router
    var href = b.getAttribute && b.getAttribute('href');
    if (href && href[0] === '#') return;       // anchor links
    toast(state.lang==='th'
      ? 'ปุ่มนี้กำลังเชื่อมต่อระบบหลังบ้าน — เร็ว ๆ นี้'
      : 'This button is being wired to the backend — coming soon');
  });

  // boot — a returning user with a valid token lands straight in the app
  (async function(){
    if (getTok()) {
      try {
        await api('/api/auth/me');
        state.page = 'profile';
        render();
        // Pull cloud state in background (silent — merge into local + re-render if changed)
        if (typeof cloudPullOnBoot === 'function') cloudPullOnBoot();
      }
      catch(e){ setTok(''); }
    }
  })();
})();
</script>
</body>
</html>
